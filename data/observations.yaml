- id: 20
  title: The Independent Internal Resistance Clock
  diagnosis: 'The coercive-endurance model (A12) describes external confrontation-to-diplomacy sequencing, but February 2026
    student protest expansion reveals an independent internal clock. The four clocks: (1) Washington Patience Clock, (2) Succession
    Clock, (3) Coercive-Endurance Clock, (4) Internal Resistance Clock (governed by academic calendar, mourning cycles, Nowruz
    convergence). The coercive-endurance model assumes the regime can sustain Phase 2 as long as needed; the internal resistance
    clock degrades this assumption. Internal strain may push pragmatists toward Phase 4 faster than external dynamics alone.
    The spoiler interaction: eschatological faction reads internal resistance as argument for more repression, amplifying
    the Phase 3->4 fracture point.'
  strategic_implication: Track student protest expansion, judicial pipeline throughput (8,843 indictments), and university
    shutdown scope as leading indicators of regime internal strain that may accelerate or disrupt the external negotiation
