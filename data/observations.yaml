  - Obs 008
  - S1B
  confidence: '[Inference -- High]'
  version_added: v1.3
  session_added: 12
- id: 13
  title: US Policy Operates Two Mutually Undermining Tracks
  diagnosis: 'The US is simultaneously negotiating with the Iranian regime (Track A: Geneva) and planning for its replacement
    (Track B: Kushner-led Florida Group). This two-track structure is not secret. The structural effect is mutual undermining:
    Track A requires commitment to regime preservation; Track B signals regime replacement. Personnel overlap: Kushner operates
    in both tracks. Financial relationships (Trap 11) contaminate both. The ''wrong diaspora'' problem: Track B introduces
    its own wrong-interlocutor problem. Palm Beach business elites are a self-selected subset whose access is mediated by
    Gulf state financial relationships; the 5-8 million diaspora may have different priorities.'
  strategic_implication: Track B's existence makes Track A less likely to succeed, making Scenario 2 more likely -- the outcome
    preferred by the Graham coalition, Israel, and the eschatological faction (for opposite reasons). The two-track structure
    is not neutral; it structurally favors actors who want the deal to fail.
  itb_anchors:
  - ISA-TRAPS Trap 12
  - Trap 11
  - ITB-G (diaspora)
  - ITB-F F1.2
  scenario_impact:
    S1: Probability decreases. Regime cannot negotiate in good faith while aware of Track B.
    S2: Probability increases. Track A failure provides pretext.
    S3: Largely unaffected -- internal dynamics are primary.
    S5: Track B theoretically supports this but is ad hoc, elite-captured, and contaminated.
  confidence: '[Inference -- High for structural mechanism; Med for Florida Group details]'
  version_added: v1.4
  session_added: 13
- id: 14
  title: The Senate Kill Switch Operates Independently of All Other Failure Mechanisms
  diagnosis: 'The Graham-Cotton-Britt resolution (S.Res.212) establishes deal parameters that Iran has explicitly stated are
    non-starters (zero enrichment, total dismantlement, missile elimination, terrorism cessation). Graham chairs Senate Appropriations
    Subcommittee on State, Foreign Operations. INARA guarantees Congressional review. Even a deal surviving all other failure
    mechanisms must survive Congressional review under parameters set by actors with documented financial alignment with the
    pro-strike coalition. The executive-legislative gap is widening: US officials signaled willingness to accept ''token enrichment''
    contradicting S.Res.212. The three-clock model: (1) Succession Clock (months-years), (2) Washington Patience Clock (weeks),
    (3) Congressional Clock (months, delayed-action kill mechanism post-signing).'
  strategic_implication: Deal assessment must now include Congressional survival probability as an independent variable. For
    any deal involving token enrichment, the answer is almost certainly 'no' -- capping deal expected lifespan at INARA review
    timeline.
  itb_anchors:
  - ISA-TRAPS Trap 11 (v2.0)
  - ITB-F F1.2
  - Obs 010
  cross_refs:
  - Obs 010 (Two Clocks -> Three Clocks)
  - Trap 11
  confidence: '[Inference -- High]'
  version_added: v1.4
  session_added: 13
- id: 15
  title: The Saudi-UAE Rift Introduces a New Regional Instability Dimension
  diagnosis: 'Saudi Arabia and the UAE are in open conflict across multiple theaters: Yemen, Sudan, and Israel normalization.
    The assumption underlying most Iran scenarios is a united Gulf front. If alignment fractures: Saudi may defect from pro-strike
    coalition; post-regime energy pitch requires Gulf coordination the rift undermines; divided Gulf enables China/Russia
    to exploit. Graham''s mediation is not neutral -- it''s coalition management for the pro-strike camp aligned with UAE-Israel
    axis.'
  strategic_implication: 'The Saudi-UAE rift should be tracked as a flow variable: it affects post-transition regional architecture
    viability, whether a united Gulf front exists for or against US military action, and Graham''s mediation activity is a
    leading indicator of severity.'
  itb_anchors:
  - ITB-F F4 (UAE)
  - F5 (Saudi Arabia)
  - ISA-TRAPS Trap 9
