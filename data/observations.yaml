    subsequently issued an explicit threat via ISNA to strike the NNRC directly if regime change is pursued. The IAEA confirmed
    no damage to either Dimona or Natanz facilities and no radiation release, but called for military restraint near nuclear
    sites. This exchange established nuclear-for-nuclear targeting as an accepted escalation rung — a threshold that neither
    side has walked back from. Day 21 may be the single most consequential escalation event of the war.
