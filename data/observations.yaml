  title: IRGC-Hezbollah Operational Takeover -- Multi-Front Regionalization
  diagnosis: IRGC officers have effectively taken operational control of Hezbollah per Al-Arabiya. Officers recently arrived
    from Iran, rebuilding military capabilities, personally briefing fighters, meeting missile units at Beqaa Valley site
    subsequently struck by Israel (3 sites, 12 killed including senior officer). Iran pressuring Hezbollah to fight alongside
    Iran if US strikes.
  strategic_implication: S2 expands from bilateral US-Iran to regional multi-front (Lebanon/Israel, Hormuz, Red Sea, Iraq).
    Israel's preemptive strikes indicate IDF decided not to wait for US timeline. Lebanon front creates independent escalation
    pathway that could trigger wider war even during ongoing negotiations.
  itb_anchors:
