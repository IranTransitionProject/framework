- id: 16
  title: Larijani as Shadow Governance -- The Authorization Chain Problem
  diagnosis: 'Since early January 2026, Ali Larijani (SNSC Secretary, former IRGC commander, former Majlis Speaker) has effectively
    been running Iran, sidelining President Pezeshkian. Key findings: Khamenei delegated governance to Larijani; Pezeshkian
    refers decisions to Larijani; Araghchi required Larijani authorization to contact Witkoff; Larijani ran January protest
    crushing; new Defense Council under Shamkhani; four-layer succession ordered for every key position; all armed forces
    at highest readiness. Five structural implications: (1) Wrong interlocutor CONFIRMED and DEEPENED; (2) Succession dynamics
    ACCELERATED; (3) Larijani vs. Mirbagheri = post-Khamenei fight (documented opposition since 2011); (4) Presidential authority
    route invalid for current crisis; (5) War preparation is REAL.'
  strategic_implication: The actual decision-maker is not at the negotiating table. Four-layer succession planning signals
    the regime itself expects instability. Creates post-Khamenei fight between Larijani's institutional pragmatists and Mirbagheri's
    theological hardliners.
  itb_anchors:
  - ITB-A
  - ITB-B
  - ITB-F
