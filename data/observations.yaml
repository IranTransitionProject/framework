- id: 19
  title: The Endurance-Leverage Cycle Predicts Negotiation Windows But Not Outcomes
  diagnosis: The coercive-endurance model (ITB-A12) accurately predicts when the regime will treat diplomacy as genuine (Phase
    4) but cannot predict whether Phase 4 engagement will produce durable outcomes. Outcome prediction requires layering the
    three-segment factional model (A10.4a.5), the taqiyyah diagnostic (A8.8), and the Pinochet enrichment mechanism (A11/F12)
    onto the Phase 4-5 transition. The model's value is diagnostic (phase identification) rather than prognostic (outcome
    prediction).
  strategic_implication: External actors should use A12 to time engagement correctly (wait for Phase 4) but should NOT assume
    correctly-timed engagement guarantees success. Phase 4 is necessary but not sufficient. The most dangerous analytical
    error is concluding 'the deal window is open' without asking 'can Phase 4 survive the Phase 3->4 spoiler activation?'
  itb_anchors:
  - A12 (all subsections)
  - A10.4a
  - A8.8
  - A11
  - F12
  confidence: '[Inference -- Med-High]'
  version_added: v1.5
