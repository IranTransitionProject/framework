    IRGC economic divestiture. When interacted: (1) Puppet is most likely (1989 precedent, factional landscape, clerical credential
    requirement); (2) Weak successors cannot enforce compliance against institutional resisters controlling 25-40% of GDP;
    (3) The velocity gap becomes fatal under a puppet lacking personal authority; (4) Type B actors will not commit when political
    risk assessment shows a leader who cannot guarantee enforcement.'
  strategic_implication: 'Most likely succession outcome (puppet) structurally forecloses the only deal worth signing (Type
    B normalization). Three paths: (a) self-enforcing deal mechanisms (automated snap-back, internationally administered benchmarks);
    (b) accept hollow deal with guardrails; (c) wait for puppet-to-autonomous transformation (3-7 years).'
