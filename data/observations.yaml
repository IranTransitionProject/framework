- id: 31
  title: The Pipeline Gambit — Iran Extends Energy Warfare to Third-Country Infrastructure
  diagnosis: 'Iran has publicly identified the Baku-Tbilisi-Ceyhan (BTC) oil pipeline as a legitimate target, framing it as
    an "enemy oil supply line" because it carries ~30% of Israel crude oil. On March 5, Iranian drones struck Nakhchivan International
    Airport and a school — Nakhchivan sits on the BTC route, ~10km from the Iranian border. The IRGC Sepah Pasdaran Telegram
    channel claimed responsibility while official military denied it. Azerbaijan ordered military retaliatory measures. Turkey
    condemned the strike and invoked solidarity under the 2021 Shusha Declaration. Iran long opposed the Zangezur/Trump Route
    corridor and has accused Azerbaijan of being an Israeli intelligence base. The pipeline gambit represents a strategic
    extension of the Hormuz closure logic: if Iran cannot win the direct military confrontation, it can impose costs on the
    coalition by threatening energy infrastructure in third countries. [Fact — Med-High for threat and strike; Inference —
    Med for strategic intent linking BTC targeting to Nakhchivan strike]'
  strategic_implication: 'Pipeline targeting opens an entirely new escalation dimension. BTC runs 1,700km across three countries
    (Azerbaijan, Georgia, Turkey — the last a NATO member). Any successful disruption would spike global energy prices beyond
    the Hormuz effect, drag Turkey further into the conflict (Article 5 implications if Turkey is attacked), and force Azerbaijan
    to choose between its Israeli ties and its Iranian neighbor (with millions of ethnic Azerbaijanis in Iran). For planning:
    pipeline security is a coalition vulnerability that cannot be addressed by air superiority over Iran. The IRGC claim/deny
    pattern on Nakhchivan matches the command fragmentation pattern (Obs 032) — this may be autonomous escalation, not centrally
    directed strategy.'
