- id: 23
  title: Mojtaba Selection Confirms Wartime Eschatological Capture
  diagnosis: 'The Assembly of Experts selected Mojtaba Khamenei as Supreme Leader under IRGC pressure within ~4 days of his
    father''s assassination, bypassing normal constitutional deliberation. The decision was made extra-constitutionally (full
    Assembly could not convene; building in Qom was struck). This confirms Obs 009 (eschatological faction benefits from every
    scenario) in its most direct form: a kinetic attack on the system produced dynastic succession controlled by the security
    apparatus.'
  strategic_implication: 'The succession question is no longer "who" but "what kind of leader will Mojtaba be." He faces a
    binary decision fork: (a) use wartime mandate to consolidate and fight (cements eschatological faction); or (b) use unique
