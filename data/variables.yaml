  destroyed; remaining capacity eastern/southeastern only. Key monitoring priorities: (1) interceptor depletion rate (G27-02)
  — the hidden clock governing war duration; (2) Mojtaba alive/dead confirmation (G23-06 ELEVATED); (3) Zolghadr operational
