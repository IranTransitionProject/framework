critical_assessment: For the first time, S2 upper bound exceeds all other scenarios combined (50%). Combined S1+S1A+S1B =
  18-31%. Deal track is minority probability outcome.
scenario_independent_needs:
- Nuclear facility security framework
- Humanitarian response capacity
- Communications restoration plan
- Constitutional process design
- IRGC economic transition blueprint
- Security sector reform framework
- Diaspora coordination mechanism
- International stakeholder engagement strategy
entries:
- id: S1
  title: Negotiated Nuclear Deal + Regime Preservation
  description: US-Iran deal on nuclear track. Sanctions partially relieved. Regime survives with reduced international pressure.
    Protests suppressed. No transition.
  probability_current: 7-13%
  probability_history:
  - version: v1.0
    range: 15-25%
    rationale: Initial assessment.
  - version: v1.2
    range: 12-20%
    rationale: Geneva Round 2 produced 'guiding principles' -- diplomatically thin, below 'framework agreement.' Simultaneous
      military escalation inconsistent with genuine de-escalation.
  - version: v1.4
    range: 10-17%
    rationale: Trap 12 (two-track incoherence) + Obs 014 (Congressional kill switch) + token enrichment gap.
  - version: v1.5
    range: 7-13%
    rationale: Larijani revelation confirms wrong-interlocutor thesis at deepest level. Enrichment contradiction cluster.
      Congressional kill switch + token enrichment gap widening.
  key_variables:
  - Ghanbari financial incentive offer (A2.6)
  - Trump transactional orientation
  - two-week draft exchange window
  planning_implication: Transition planning becomes long-term contingency. Diaspora engagement shifts to sustained advocacy
    and preparation.
  cross_refs:
  - S1A
  - S1B
  - Obs 010
  - Obs 014
  - Trap 12
  parent_scenario: null
- id: S1A
  title: Nuclear Deal + Genuine Regime Moderation
  description: Deal leads to actual reform pathway. Sanctions relief empowers moderates. Gradual opening.
  probability_current: 3-6%
  probability_history:
  - version: v2.0
    range: 5-10%
    rationale: Initial assessment.
  - version: v1.5
    range: 3-6%
    rationale: Pezeshkian irrelevant -- refers all decisions to Larijani. Larijani ran January massacre. No credible moderation
      pathway through current institutional configuration.
  key_variables:
  - Existence of genuine moderate faction with independent power base
  planning_implication: Most optimistic sub-scenario. Support moderate faction through engagement.
  parent_scenario: S1
- id: S1B
  title: Nuclear Deal + Alignment Switch (Pinochet Variant)
  description: Deal provides economic oxygen and diplomatic cover. Regime uses relief to crush internal opposition. Eschatological
    faction may capture succession. Democracy foreclosed for a generation.
  probability_current: 8-12%
  probability_history:
  - version: v2.0
    range: 10-15%
    rationale: Initial assessment.
  - version: v1.5
    range: 8-12%
    rationale: 'Even hollow deal now less likely given enrichment gap too wide. Under strike scenario, Pinochet pathway time-shifts:
      strike -> regime survives but damaged -> limited deal to prevent collapse -> IRGC enrichment.'
  key_variables:
  - Deal lacks human rights conditionality
  - Khamenei succession favors hardliner
  - International community prioritizes nuclear compliance over internal governance
  planning_implication: 'This is the scenario transition planners must actively prevent. Deal design is the intervention point
    -- conditionality, snap-back, maintained civil society channels. The economic mechanism is documented: hollow deal routes
    sanctions relief through IRGC-controlled channels (51% statutory oil revenue). See ITB-F12 for conditionality architecture.'
  traps_activated:
  - Trap 1
  - Trap 8
  - Trap 10
  cross_refs:
  - Obs 012
  - ITB-A11
  - ITB-F12
  parent_scenario: S1
- id: S2
  title: Military Confrontation (Second Strike)
  description: Talks fail. US strikes Iran again (broader than Midnight Hammer). Regime damaged but possibly not destroyed.
    Chaos, humanitarian crisis.
  probability_current: 35-50%
  probability_history:
  - version: v1.0
    range: 22-33%
    rationale: Initial assessment.
  - version: v1.2
    range: 28-38%
    rationale: Largest US air deployment since 2003 confirmed. Ford CSG arriving ~end Feb. 250+ cargo flights.
  - version: v1.4
    range: 30-42%
    rationale: Graham 'decision already made' claim contradicted by Axios, but military buildup continues independently. Congressional
      kill switch makes deal failure more likely.
  - version: v1.5
    range: 35-50%
    rationale: CRITICAL THRESHOLD CROSSED -- S2 upper bound exceeds all other scenarios combined. Trump 10-15 day deadline
      (~March 1-6). 90% kinetic action estimate. Pentagon presented options including targeting Khamenei/Mojtaba. IRGC-Hezbollah
      operational takeover. Multi-front regionalization.
  key_variables:
  - Netanyahu pressure
  - Trump deadline (stated ~10-15 days from Feb 19)
  - Iranian provocation risk
  - 40-day mourning cycle (regime provocation during mourning -> US pretext)
  - Hormuz exercise complicates strike planning but also provides escalation ladder
  planning_implication: Immediate humanitarian response. Nuclear facility security urgent. Transition planning must account
    for destroyed infrastructure and enraged population. Hormuz disruption planning must be included -- oil price spike and
    shipping disruption near-certain.
  traps_activated:
  - Trap 2
  - Trap 6
  - Trap 7
  cross_refs:
  - Obs 014
  - Obs 016
  - Obs 018
  parent_scenario: null
- id: S3
  title: Regime Collapse (Internal)
  description: Regime loses coherence -- Khamenei death/incapacitation, IRGC split, or economic collapse triggers institutional
    failure. No external military trigger.
  probability_current: 16-26%
  probability_history:
  - version: v1.0
    range: 10-20%
    rationale: Initial assessment.
  - version: v1.2
    range: 12-22%
    rationale: 40-day mourning cycle active. Security forces fired on mourners. Mourning spread beyond cemeteries.
  - version: v1.4
    range: 14-24%
    rationale: University protests demonstrate secular-opportunistic escalation mechanism. Population will use ANY opening.
  - version: v1.5
    range: 16-26%
    rationale: Day 2 protests across 7+ universities, 2 cities. Students trampled Khamenei image. Larijani four-layer succession
      planning signals regime itself expects instability.
  key_variables:
  - Khamenei health
  - IRGC cohesion
  - Economic trajectory
  - Mourning cycle escalation pattern
  - University/secular-opportunistic escalation mechanism
  planning_implication: This is the scenario where transition planning matters most. Speed of response determines whether
    outcome is managed transition or chaotic collapse.
  traps_activated:
  - Trap 1
  - Trap 3
  - Trap 4
  - Trap 5
  - Trap 6
  cross_refs:
  - Obs 011
  - Obs 020
  parent_scenario: null
- id: S4
  title: Prolonged Decay
  description: Neither deal nor strike nor collapse. Regime limps on with diminished legitimacy, ongoing low-level unrest,
    economic deterioration, brain drain acceleration. Slow-motion erosion over years.
  probability_current: 12-18%
  probability_history:
  - version: v1.0
    range: 25-35%
    rationale: Initial assessment.
  - version: v1.2
    range: 22-30%
    rationale: Compressed by acceleration in S2 and S3. Current trajectory inherently unstable.
  - version: v1.4
    range: 18-26%
    rationale: Most compressed scenario. Nothing is plateauing.
  - version: v1.5
    range: 12-18%
    rationale: 'Multiple simultaneous acceleration vectors: Trump deadline, university protests, IRGC-Hezbollah reactivation,
      missile deployments, succession planning, enrichment gap. Decay requires plateau. Current dynamics are the opposite.'
  key_variables:
  - Regime's residual repressive capacity
  - International attention span
  planning_implication: Transition planning shifts to long-term institutional capacity building. Diaspora coordination mechanisms
    matter more than rapid response.
  parent_scenario: null
- id: S5
  title: Managed Transition (Negotiated)
  description: Internal regime faction negotiates handover of power -- possibly triggered by Khamenei succession. IRGC pragmatists
    cut deal to preserve economic interests in exchange for political transition.
  probability_current: 5-10%
  probability_history:
  - version: v2.0
    range: 5-10%
    rationale: Initial assessment. Larijani's rise neither confirms nor eliminates pragmatist willingness. His documented
      opposition to Paydari since 2011 means institutional pragmatists and eschatological faction are distinct poles. Requires
      conditions not currently present.
  key_variables:
  - Existence of pragmatist faction within IRGC willing to trade political power for economic preservation
  - IRGC divestiture from NIOC -> Western oil majors enter South Pars -> $35-50B investment -> income in normalized economy
    exceeds monopoly rents by order of magnitude
  - Personal security guarantees in post-transition environment
  - Chinese counterfactual understanding
  planning_implication: Best-case scenario for institutional continuity. Requires most sophisticated negotiating framework
    and most detailed transition architecture. The wrong interlocutor problem (Obs 010) remains -- this calculation is available
    to pragmatists only; eschatological faction will reject on theological grounds.
  traps_activated:
  - Trap 1
  - Trap 5
  cross_refs:
  - Obs 010
  - Obs 021
  - ITB-F12
  - ISA-TRAPS Trap 1
  parent_scenario: null
