  **Update note (Feb 22, 2026):** The factional opponent of the Paydari/Mirbagheri network now has a name and a documented institutional base. On February 22, the New York Times confirmed that Ali Larijani \-- the same figure from whom the Paydari Front split in 2011 \-- has been effectively running Iran since January. The succession contest this brief describes is now a documented, named rivalry: Larijani's pragmatic-institutionalist network against the Mirbagheri/Paydari eschatological faction. See Brief \#7, "Who Is Actually Running Iran?" for the full analysis.

