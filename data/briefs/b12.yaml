sections:
- title: The Moment the Framework Was Built For
  level: 2
  content: |
    On the morning of February 28, 2026, the Islamic Republic of Iran activated a succession process it had been quietly preparing for years — not because it was ready, but because it had no choice. Ali Khamenei, Supreme Leader since 1989, was killed in a precision strike on his compound during the opening hours of Operation Epic Fury. The IRGC commander died the same day. By nightfall, Iran's Provisional Leadership Council was convened, ballistic missiles had struck every Gulf state including France's naval base in Abu Dhabi, and the Assembly of Experts — the 88-seat clerical body constitutionally empowered to choose the next Supreme Leader — was racing to determine whether it could physically convene at all.

    Within 72 hours, the picture had begun to sharpen. The Assembly's internal Commission for Determining Instances of Leadership finalized a candidate shortlist and circulated it to members. A bylaws update enabling remote voting was underway — solving the physical convocation problem without bypassing the formal process. And a prior consultative phone vote, a non-binding رأی‌گیری استمزاجی to gauge the Assembly's mood, had already been conducted. The result: Alireza Arafi emerged as the leading choice.

    This brief addresses the single most consequential open question in the current crisis: who governs Iran after Khamenei, and what that means for everything else.

    The answer is not primarily about names on a candidate list. It is about which of three factions — a pragmatist institutional network, a theologically motivated eschatological movement, and a decapitated military bureaucracy — can impose its preferred outcome on a body of 88 clerics deliberating under wartime conditions, with US strikes still ongoing and internet blackout limiting what any of them can actually know.
- title: What the Constitution Says (and Why It Only Partially Matters)
  level: 2
  content: |
    The formal succession procedure is clear. Article 111 of the Islamic Republic's constitution specifies that upon the Supreme Leader's death, a Provisional Leadership Council — consisting of the President, the Judiciary Chief, and a member selected by the Expediency Council from among the Guardian Council — exercises supreme leadership powers until a permanent successor is chosen. That council is now in place: President Masoud Pezeshkian, Judiciary Chief Gholam-Hossein Mohseni-Ejei, and Alireza Arafi, Deputy Chairman of the Assembly of Experts.

    The Assembly of Experts then convenes "as soon as possible" to select the next Supreme Leader by majority vote. All 88 members are conservative or hardline. None are reformists; none are independent. The chair, 92-year-old Movahedi Kermani, will preside over a process that cannot safely happen in person while precision strikes continue targeting Tehran infrastructure.

    The bylaws update enabling remote voting and written ballot collection — with an online meeting to discuss candidates planned — solves this problem procedurally. It means the succession will happen on a timeline controlled by the institutional establishment, not postponed indefinitely. And the timing of a succession, as this brief will show, is itself a factional choice with enormous downstream consequences.

    This constitutional process is real, and it will happen. But it will ratify a decision made elsewhere, through means the constitution does not describe.

    The history of the Islamic Republic is a history of formal institutions serving as the legitimating shell for decisions reached through factional negotiation, IRGC pressure, and financial inducement. The selection of Khamenei himself in 1989 — a figure with insufficient clerical rank for the position — was engineered by Rafsanjani through exactly this mechanism. The formal vote followed the real negotiation; the outcome was predetermined by the time the Assembly counted hands.

    What follows is an analysis of the three forces competing to make the real decision this time.
- title: 'The Pragmatist Network: Larijani''s Consolidation Play'
  level: 2
  content: |
    Ali Larijani is the most important person in Iran today, and he cannot become Supreme Leader.

    Brief #7 in this series documented the revelations — confirmed by six senior Iranian officials, including three IRGC members — that Larijani had been effectively running Iran since early January 2026. He oversaw the nuclear negotiations. He managed the IRGC's security operations. He held the Khamenei-authorized succession directives: four-layer backup plans for every key position, the kind of preparation that only makes sense when you are planning for a power vacancy.

    Larijani survived the strikes. His warning to "secessionist groups" of a "harsh response" — delivered hours after Khamenei's death, with the republic's formal leadership in shock — is the signature of a man who considers himself in operational command. He is the continuity figure. The system's institutional memory runs through him.

    His problem is structural. The Supreme Leader must hold the rank of marja, a senior level of Shia clerical authority that Larijani, a political operator not a theologian, does not possess. He cannot take the office himself. He must install someone else and exercise power through them — exactly the architecture Brief #8 ("The Puppet Problem") analyzed before the strikes as the most likely post-Khamenei configuration.

    His preferred candidates are almost certainly Arafi or Sadiq Larijani (his brother, former judiciary chief, a cleric with genuine theological credentials). Sadiq Larijani as Supreme Leader plus Ali Larijani as operational commander would be the maximum-power outcome for the pragmatist network. Arafi — already on the Provisional Council, already governing — is the safer bet: a trusted Khamenei confidant who can be managed from outside.

    Larijani's wartime advantage is structural. He already controls the operational machinery. In chaos, the person who controls the phones, the SNSC apparatus, and the succession directives has an enormous head start over factions that must first mobilize through mosques and heyat networks. Every day the Provisional Council governs without a permanent Supreme Leader is a day that strengthens his position — because that council includes Arafi, his preferred candidate, already exercising supreme leadership powers.

    The pragmatist strategy is procedural control: the bylaw update enabling remote voting proceeds, Arafi leads the consultative poll, the institutional establishment closes the succession before emotional wartime momentum can shift the outcome toward the hardliners. [Inference — High]
- title: 'The Eschatological Faction: Mirbagheri''s Prophetic Moment'
  level: 2
  content: |
    For Ayatollah Mohammad-Mahdi Mirbagheri, the killing of Ali Khamenei by an American-Israeli strike is not a catastrophe. It is a confirmation.

    Brief #4 in this series profiled the faction that, for nineteen years, has blocked every nuclear agreement Iran has approached. Its theological core holds that we are living in the End Times, that the confrontation between Iran and the West is the prophesied final battle between the Front of Truth and the Front of Falsehood, and that a peaceful resolution of the nuclear crisis would constitute — in theological terms — surrendering to the Dajjal, the deceiving false messiah who appears before the return of the Hidden Imam.

    Mirbagheri has stated this publicly. He has said that even if half the world's population were killed in the pursuit of divine purpose, it would be acceptable. He has framed diplomatic engagement with the West as "integrating Iran into the current world order" and weakening it "like Japan and Germany." The killing of a Supreme Leader by American bombs is, inside his theological framework, not evidence that resistance is futile. It is evidence that the eschatological timeline is accelerating.

    His organizational assets are formidable. He holds a seat on the Assembly of Experts — the body that now decides everything. The Paydari political party controls a significant parliamentary bloc and, critically, segments of state broadcasting through Vahid Jalili (brother of Saeed Jalili) at IRIB. The MASAF media network targets young Basij members. The heyat network — the religious mourning associations that became significant political mobilization infrastructure — provides reach into the Basij's provincial structure. And Sadegh Mahsouli's independent financial backing means the faction does not depend on state budgets.

    Mirbagheri cannot likely win a straight vote against a unified institutional-pragmatist coalition. ITB-A10 assessed him as "a veto player, not a governing majority." His more likely strategic position is kingmaker — extracting institutional concessions in exchange for his Assembly votes, or positioning a faction-aligned candidate to capture the role while Mirbagheri controls the theological narrative.

    Under assassination conditions, the emotional moment was his. The argument for a "warrior Supreme Leader who will never negotiate with the murderers of our Supreme Leader" is politically resonant when the Supreme Leader was just murdered. But the consultative phone poll showing Arafi in the lead suggests the institutional establishment moved faster than the eschatological faction could mobilize. The remote voting mechanism, if it proceeds before in-person dynamics can shift outcomes, closes the window before Mirbagheri's emotional advantage converts into Assembly votes.

    The first observable signal of whether the factional battle is won or still contested: whether Mirbagheri or the Paydari bloc publicly challenges the legitimacy of the remote voting procedure. Silence means acceptance or tactical retreat. A public procedural challenge means the succession is still genuinely contested.
- title: 'The IRGC Institution: Decapitated but Not Destroyed'
  level: 2
  content: |
    The IRGC has lost its Commander-in-Chief. Ahmad Vahidi is the reported successor — a former Defense Minister, an IRGC veteran with Interpol red notices against him for the 1994 AMIA bombing in Buenos Aires, an establishment figure without eschatological faction alignment. Whether his appointment has fully consolidated is unconfirmed.

    What the IRGC wants as an institution is not ideological. It is structural: a Supreme Leader whose theological legitimacy stabilizes the system while not threatening IRGC economic interests. The "weak, ailing ayatollah" thesis from Brief #8 — that the IRGC prefers a figurehead who constitutionalizes their power rather than a strongman who might challenge it — remains the institutional baseline.

    Reuters describes Arafi as "a completely trusted loyalist" of the regime whom the IRGC views as "a safe pair of hands during a sensitive transition." If accurate, this represents convergence between the military bureaucracy and the pragmatist network around a caretaker candidate, rather than a gamble on theological acceleration.

    The IRGC's cohesion remains the single most decisive structural unknown. If it holds behind Vahidi's leadership, it functions as stabilizing weight behind the institutional establishment's preferred outcome. If it fractures along factional lines — career military bureaucrats versus Basij ideologues — the succession contest becomes an internal armed competition, and every scenario becomes unstable.
- title: The Candidate Map
  level: 2
  content: |
    **Alireza Arafi** — Leading the consultative phone poll as of March 2. Already on the Provisional Council and exercising supreme leadership powers. Trusted Khamenei confidant, head of the seminary system, deputy AoE chairman. Low political profile reduces factional opposition; deep institutional connections guarantee functionality. The IRGC views him as a safe pair of hands.

    His complications are real. He simultaneously sits on the Provisional Leadership Council (governing Iran now), serves as deputy AoE chairman (overseeing the succession vote), and holds a Guardian Council seat (formally vetting Supreme Leader candidates) — meaning he participates in vetting himself. In normal Iranian institutional politics, such overlapping positions are standard. Under wartime legitimacy pressure, this overlap becomes a procedural weapon the eschatological faction could deploy to challenge the result if it loses the vote.

    The deeper complication, identified by credible diaspora analyst Mehdi Yahyanejad: Arafi is "cautious, risk-averse," and it is genuinely uncertain "whether he would take the bold decisions that may be required to save the regime at its worst crisis." This is the administrator-in-wartime failure mode — a figure selected for institutional competence, inheriting conditions that require something the system has never asked of this kind of candidate. [Fact — High, confirmed by Reuters, CNN, Al Jazeera, MEI independently that he leads the field; Inference — High that he is the establishment's preferred outcome; Uncertain whether his character matches the crisis's demands]

    **Hassan Khomeini** — The Prophet's grandson carries the most powerful brand in Islamic Republic history: the founder's bloodline, a reformist-adjacent reputation that would signal conciliation to the international community, and no organizational base that would threaten any faction. Brief #8 analyzed him as the ideal puppet candidate. Under assassination conditions, he becomes the unity option — allowing the pragmatist network to claim Khomeinist legitimacy while managing actual governance. [Inference — Medium-High as the pragmatist faction's symbolic fallback if Arafi's institutional conflicts create procedural problems]

    **Sadiq Larijani** — The pragmatist network's maximum-power outcome. Former judiciary chief, genuine clerical credentials, brother of the operational commander. If Ali Larijani can engineer this, the pragmatist network controls both formal and informal levers simultaneously. Whether the Assembly accepts such naked consolidation of one family's power is the constraint. [Inference — Medium]

    **Mojtaba Khamenei** — The Supreme Leader's son controls IRGC intelligence networks and carries "son of the martyr" emotional framing under assassination conditions. He lacks senior clerical rank, his father publicly opposed hereditary succession, and his wife was reportedly killed in the compound strike. More likely as power-behind-the-throne than as Supreme Leader himself. [Uncertain — assassination conditions escalate his prospects; structural barriers remain]

    **Mohammad-Mahdi Mirbagheri** — The eschatological faction's spiritual leader. An Assembly seat, a wartime theological narrative his framework treats as divine confirmation, and organizational infrastructure reaching into Basij provincial networks. He cannot likely win a straight vote if the institutional establishment controls the process. If that process is delayed, disrupted, or challenged, the window reopens. [Uncertain — entirely dependent on whether the procedural contest is won or lost by the institutional bloc]
- title: 'The External Environment: More Constrained Than Any Scenario Modeled'
  level: 2
  content: |
    The succession contest does not take place in a bilateral US-Iran vacuum. The same wave of Iranian missiles and drones that struck every Gulf state also struck Camp de la Paix — France's naval base in Abu Dhabi. Two Iranian drones hit aircraft storage, causing fire and damage. No casualties. France had not participated in Operation Epic Fury. Its base was struck anyway.

    This is the 1988 doctrine executing without strategic discrimination: impose maximum regional costs on all military presences, regardless of participation. The doctrine does not ask whether a country was party to the strike. It asks whether a country hosts military infrastructure in the region. France qualified.

    The French response was immediate. The aircraft carrier Charles de Gaulle reversed course from a Baltic NATO mission to the Eastern Mediterranean. The EU reinforced its Aspides naval mission in the Red Sea with two additional French vessels. Prime Ministers Starmer, Macron, and Chancellor Merz issued a joint statement that they are "ready to work with the US and partners to help stop Iran's retaliatory attacks." The E3 nuclear diplomacy track — France, UK, Germany — that provided the framework for the JCPOA and every subsequent negotiation is now structurally compromised. France cannot serve as diplomatic bridge when its forces have been struck.

    The successor inherits not a bilateral confrontation with the United States and Israel but a situation in which Europe — which Iran struck while Europe was calling for de-escalation — has moved from alarm to operational involvement. The pragmatist case for "negotiate our way back to a manageable equilibrium" requires Western interlocutors willing to engage with the country that hit their bases. Even the Arafi scenario — the cautious administrator who manages the system through the crisis — begins its tenure in an external environment more constrained than any pre-strike model assumed. [Inference — High. Structural logic; European military posture shift is confirmed fact]
- title: What the Assassination Condition Changes
  level: 2
  content: |
    Vali Nasr assessed this precisely before the strikes: if Khamenei dies naturally, a moderate could become Supreme Leader. If he is assassinated, a hardliner will almost certainly take control. The logic is structural. Selecting a conciliatory successor after assassination by the United States and Israel validates the action that killed his predecessor and delegitimizes the office from the moment it is filled.

    The consultative phone poll showing Arafi in the lead applies pressure to this thesis. The institutional establishment, moving quickly through a controlled remote process, appears to be selecting for stability over ideological intensity. The countervailing logic: existential pressure produces preference for a stabilizer who preserves the system, not an accelerant who bets the system on theological fulfillment.

    But the Nasr thesis is conditional on process, not falsified by a single poll. If the vote proceeds remotely and quickly under institutional control, the pragmatist-IRGC coalition may succeed in installing a caretaker before wartime emotional momentum can be converted into Assembly votes for a hardliner. If the process is delayed, disrupted, or challenged — if the Paydari bloc contests the remote voting bylaw, if the IRGC fractures, if physical convocation in Tehran becomes possible before Arafi is confirmed — the emotional weight of the assassination reasserts itself.

    The institutional establishment has the lead. It does not yet have the finish line.
- title: What This Means for Washington
  level: 2
  content: |
    Marco Rubio said in September 2015, explicitly for the historical record: Khamenei "is not a traditional geopolitical actor who makes decisions on the basis of borders, or simply history, or because of ambitions. He has a religious apocalyptic vision of the future."

    Rubio was describing Khamenei. The description fits Mirbagheri more precisely. While Khamenei maintained a theological fatwa against nuclear weapons that functioned as a constraint on the eschatological faction, his successor — selected under assassination conditions, potentially beholden to the faction that made hardline arguments for nineteen years — may not maintain that constraint.

    If Arafi is confirmed, Washington gets a cautious, risk-averse administrator who has met the Pope, speaks Arabic, and has publicly advocated for cultural diplomacy. This is the most negotiation-compatible successor scenario available. The complication is structural. Brief #7 established that the authorization problem in Geneva was not about personalities but about chains: Araghchi could not commit without Larijani, who could not commit without Khamenei. With Arafi as Supreme Leader and Larijani as operational commander, that chain restructures but does not simplify. Who can actually deliver operational compliance on any agreement — particularly given the command-delivery gap created by IRGC decapitation — remains the central unresolved question.

    The window between now and the Assembly's formal confirmation is the most consequential diplomatic window since the JCPOA. The wrong-interlocutor problem (Brief #7) is now a literal absence — there is currently no fully authorized interlocutor at all. The puppet problem (Brief #8) is the live architecture — whoever is installed will govern in relationship to the forces that installed them. The eschatological spoiler problem (Brief #4) is at its maximum theological force, validated by the assassination itself.

    Washington must answer not just which Iranian faction to negotiate with, but whether the succession process produces any actor capable of making a binding commitment — and whether any offer on the table is one that a plausible successor could accept without losing the theological legitimacy the office requires on the day it is filled.
- title: What to Watch
  level: 2
  content: |
    **Whether Mirbagheri or the Paydari bloc challenges the remote voting procedure.** The first and most important observable signal. Silence means the institutional establishment has successfully closed the window. A public procedural challenge means the factional contest is genuinely open.

    **IRGC cohesion under Vahidi.** The decisive structural unknown. If the institution holds together behind establishment pragmatism, the eschatological faction lacks the military lever to enforce its preferred outcome. If it fractures, all scenario assessments become unreliable.

    **Arafi's behavior on the Provisional Council.** Is he governing as a caretaker — deferring decisions, maintaining continuity — or positioning as a candidate — making visible decisions, cultivating IRGC relationships, building personal authority? The difference is observable in real time.

    **Larijani's two-track communications.** The sequence on March 2 is analytically significant and should be read as a single integrated move, not a contradiction. The Wall Street Journal reported that Larijani pushed for resumed talks through Omani mediators following Khamenei's death. Hours later, he posted on X: "We will not negotiate with the United States." Then came a string of aggressive English-language posts trolling Trump ("Israel First"), calibrated for maximum domestic visibility.

    This is the two-track play in real time: negotiate quietly through back channels while performing defiance publicly for the domestic audience that matters — the Assembly of Experts and the IRGC institutional bloc watching who controls the post-Khamenei narrative. A pragmatist who immediately telegraphed willingness to deal would be politically destroyed before the succession is settled. The "no negotiations" statement is a floor price, not a door closing — it raises the cost of an eventual deal so that when a deal happens it reads as Iranian victory, not capitulation. Watch whether back-channel Oman contact is sustained while the public defiance continues. That gap between the tracks is the actual negotiating signal. [Inference — High; two-track structure is standard Iranian diplomatic practice documented across every major negotiation since 2003; the WSJ-reported Oman push predates the public defiance statement by hours]

    **Assembly convocation timeline.** If remote balloting proceeds within days, the institutional establishment has won the process battle. If it stalls — through procedural challenge, technical problems, or IRGC interference — the succession remains genuinely contested and the Nasr thesis reasserts.
