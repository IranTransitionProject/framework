    conditions place it in Phase 3–4 transition. Outcome: Under bombardment, the coercive-endurance model is confirmed. The
    regime''s wartime behavior — coercing the women''s soccer team across continents, Fars News calling for 1988-style executions,
    Basij abandoning governance function while weaponizing humanitarian infrastructure (Obs 029), manufactured complicity
    trap (Obs 030) — all map to the Phase 4 fracture dynamics the model predicted. The compliance gradient (symbolic compliance
    functional while military command fragments) is a refinement the model did not explicitly predict but is consistent with
    its structure.'
