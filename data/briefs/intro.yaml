sections:
- title: 'Introduction: The Iran Transition Project'
  level: 2
  subsections:
  - title: What This Is
    level: 3
    content: 'The Iran Transition Project is an independent analytical framework examining the Islamic Republic''s regime
      architecture, internal stress dynamics, and the structural conditions shaping what comes next \-- whether that is a
      deal, a strike, a succession crisis, or a transition.


      The project exists because most Western analysis of Iran gets the internal picture wrong. It treats the regime as either
      a rational unitary actor (the diplomat''s model) or an irrational ideological monolith (the hawk''s model). Neither
      captures what is actually happening inside the system: a factional competition among actors with incompatible objectives,
      operating through institutions whose internal logic is invisible to anyone relying solely on English-language sources.


      On February 22, 2026, the New York Times confirmed the project''s central finding: Ali Larijani \-- not President Pezeshkian,
      not Foreign Minister Araghchi \-- has been effectively running Iran since January. Araghchi required Larijani''s authorization
      to take a phone call from the US envoy. Washington has been negotiating with a messenger. The decision-maker has never
      been at the table. This is not a palace intrigue story. It is a structural failure in the deal''s theory of the case
      \-- and it is the thread that runs through all ten briefs below.


      This work draws on over 100 English, Farsi, and Hebrew sources, peer-reviewed academic research, investigative journalism,
      regime media analysis, institutional documentation, and direct knowledge of Iranian political culture. It is AI-assisted
      (Claude/Anthropic) but human-directed. The analytical methodology uses epistemic tagging (every claim is marked as Fact,
      Inference, or Speculation with a confidence level), multilingual source integration, and regime source filtering to
      distinguish state propaganda from operational signals.


      The author is an Iranian-American independent analyst with no factional allegiance, no institutional affiliation, and
      no policy agenda beyond analytical accuracy. Contact with faction adherents informs the analysis; alignment with none
      of them constrains it.

      '
  - title: The Foundation
    level: 3
    content: 'Behind the briefs below sits a larger analytical structure built across sixteen working sessions in February
      2026:


      **The Iran Transition Baseline (ITB)** maps the regime''s architecture across eight pillars: regime structure, security/military,
      economy, social fabric, territory, international position, diaspora, and information control. It decomposes the system
      the way an engineer decomposes a machine \-- identifying which components bear load, which ones are hollow, and where
      the stress fractures run.


      **The Intervention Stress Architecture (ISA)** models how external shocks \-- strikes, sanctions, deals, succession
      events \-- propagate through the structure mapped by the ITB. It identifies eight traps that have destroyed previous
      transitions (Iraq, Libya, Syria, Afghanistan), twenty one observations about the current moment, and five scenarios
      for how this ends \-- with the military confrontation scenario now carrying the highest probability for the first time.


      Together, the ITB and ISA comprise over twenty modular analytical files. They are not published in full \-- they are
      the working documents from which public-facing analysis is derived.

      '
  - title: The Convergence Briefs
    level: 3
    content: 'In February 2026, four independent timelines are converging on the same days:


      - A nuclear negotiation track compressed to days: Geneva Round 3 confirmed for Thursday February 26 by Oman''s foreign
      minister, with Iran''s written proposal still being finalized as of February 24. Iran''s FM Araghchi told CBS he sees
      "a good chance" for a diplomatic solution while Pezeshkian stated Iran is prepared for "any potential scenario." The
      enrichment gap remains unresolved -- Witkoff insists on zero enrichment while Araghchi claims the US has not asked for
      it

      - The largest US military buildup in the Middle East since 2003 \-- two carrier strike groups, 160+ aircraft, fifteen
      destroyers, 800 sorties/day capacity, force sized for weeks of sustained operations \-- with Axios reporting this is
      "likely the last chance President Trump will give Iran before launching a massive U.S.-Israeli military operation"

      - A supreme leader succession competition now concretely defined: Larijani''s pragmatic-institutionalist network versus
      the Mirbagheri/Paydari eschatological faction, with Khamenei at 86 and diminished

      - The 40-day mourning cycle for the January massacre, compounded by student protests across twelve or more university
      campuses in four cities -- the same mechanism that produced the 1979 revolution, now running on two fronts simultaneously,
      with some universities shutting down in-person classes through Nowruz (March 20)


      These ten briefs present the structural findings that decision-makers, observers, and the Iranian diaspora need to understand
      this convergence. They are not predictions. They are not advocacy. They are an attempt to correct specific analytical
      errors that, if left uncorrected, will produce bad decisions at the worst possible time.


      Each brief stands alone. Read together, they build a cumulative picture.

      '
- title: Brief \#1 \-- The Blind Spot in Every Iran Deal
  level: 3
  content: '*Why Western negotiation models are built for the wrong adversary.*


    The Islamic Republic possesses something no other negotiating counterpart does: a theological doctrine (taqiyyah) that
    explicitly authorizes the decoupling of observable behavior from actual intent, embedded in institutional training from
    seminary to diplomatic corps. Western analytical models have no mechanism to account for this. The brief identifies four
    failure modes this creates and what verification design must look like if it takes the actual adversary seriously. **Update:**
    The Larijani revelation confirmed Recommendation \#4 ("Watch the SNSC, not the FM") as sourced fact. [->](https://hmehr.substack.com/p/the-blind-spot-in-every-iran-deal)

    '
- title: Brief \#2 \-- The Country Inside the Country
  level: 3
  content: '*Why every plan for Iran gets the IRGC wrong.*


    The Revolutionary Guard is not an army with side businesses. It is a complete, self-reproducing, cradle-to-grave parallel
    society \-- separate schools, gated compounds, dedicated universities, an economic empire employing millions. The primary
    binding mechanism is economic dependency, not ideology. This means the system is internally hollow and potentially disaggregable
    through economic alternatives rather than ideological confrontation. It also means that dissolving it overnight, Iraq-style,
    would be catastrophic. [->](https://hmehr.substack.com/p/the-country-inside-the-country)

    '
- title: Brief \#3 \-- Iran Is Not Iraq
  level: 3
  content: '*And anyone who plans as if it is will create something worse.*


    The regime''s strongest card is the argument that without it, Iran becomes Iraq. Seven structural differences explain
    why this is wrong: Iran has a pre-existing state, a 2,500-year national identity, a strategically capable diaspora, a
    divided military, a structured economy, no foreign occupation, and the benefit of four documented failure cases to learn
    from. The comparison is not invalid \-- the IRGC problem is real \-- but it is not determinative. [->](https://hmehr.substack.com/p/iran-is-not-iraq)

    '
- title: Brief \#4 \-- The Spoiler
  level: 3
  content: '*The faction inside Iran that has blocked every nuclear deal for 19 years \-- and has a theological reason to
    keep doing it.*


    An eschatological network centered on Ayatollah Mirbagheri and the Paydari Front views any agreement with the United States
    as theological betrayal. The faction has a 19-year documented sabotage record, parliamentary representation, a member
    on the body that selects the next Supreme Leader, independent financing, and a media operation targeting young Basij members.
    A self-tightening electoral ratchet is concentrating power in their direction. They cannot govern, but they can veto.
    **Update:** The Paydari was founded in 2011 from a split with Larijani \-- the succession contest is now a named, documented
    rivalry. [->](https://hmehr.substack.com/p/the-spoiler)

    '
- title: Brief \#5 \-- The Deal That Cannot Hold
  level: 3
  content: '*Why the Iran nuclear deal fails on three fronts \-- and enriches the IRGC in the process.*


    The most likely diplomatic outcome has a structural failure architecture operating on three independent fronts: internal
    spoilers with theological motivation and institutional capacity, external equilibrium beneficiaries (Qatar, UAE, China,
    Russia) whose financial interests converge on a hollow deal, and an economic mechanism that channels sanctions relief
    to the IRGC rather than Iran''s population. The brief documents the Larijani/Deng Xiaoping self-model, the wrong-interlocutor
    thesis now confirmed by NYT sourcing, the negotiator financial relationships shaping deal scope, and six conditionality
    requirements that would separate a hollow deal from genuine reconstruction. **v3.0 \-- the project''s most extensively
    sourced brief.** [->](https://hmehr.substack.com/p/the-deal-that-cannot-hold)

    '
- title: Brief \#6 \-- The Day After
  level: 3
  content: '*What determines whether the regime survives the next strike.*


    The US has assembled a force sized for weeks of sustained operations, with dual carrier strike groups, 800-sortie-per-day
    capacity, and Pentagon options including targeting Khamenei directly. Iran is simultaneously hardening \-- burying nuclear
    sites under concrete sarcophagi, dispersing command authority via "mosaic defense," deploying missile launchers to borders.
    The brief maps three strike scenarios, explains four structural differences from June 2025 (population mobilized, student
    second front, security forces exhausted, rally-around-the-flag compromised), documents the 50,000 detainees at execution
    risk, and identifies IRGC cohesion and Larijani survival as the two variables that determine everything. [->](https://hmehr.substack.com/p/the-day-after)

    '
- title: Brief \#7 \-- Who Is Actually Running Iran?
  level: 3
  content: '*The Larijani revelation and why the nuclear talks have the wrong man at the table.*


    On February 22, the New York Times reported that Ali Larijani has been effectively running Iran since January. This brief
    traces the authorization chain (Araghchi to Larijani to Khamenei), explains why the enrichment contradiction is a symptom
    of structural incapacity rather than miscommunication, and identifies the specific failure mode facing Geneva Round 3:
    even a good-looking proposal faces an authorization architecture where the man who can say yes is not at the table, and
    the man at the table cannot say yes without asking someone who has already said no. [->](https://hmehr.substack.com/p/who-is-actually-running-iran)

    '
- title: Brief \#8 \-- The Puppet Problem
  level: 3
  content: '*Why Iran''s next Supreme Leader may not matter.*


    The man running Iran cannot become Supreme Leader \-- he lacks the clerical credentials. The last time Iran faced this
    problem, in 1989, the solution was to install a puppet (Khamenei) who spent three decades escaping his handlers. Every
    major faction in 2026 independently prefers a controllable figurehead, making a puppet the most likely succession outcome.
    But the office generates its own gravitational field: constitutional powers that transform weak occupants into strong
    ones. A deal signed today must survive a succession that produces a leadership configuration which will itself transform
    within years. The brief identifies three succession configurations and their implications for deal survival. [->](https://hmehr.substack.com/p/the-puppet-problem)

    '
- title: 'Brief #9 -- The Doctrine Behind the Escalation'
  level: 3
  content: '*Why military strikes are the beginning of negotiations, not the end.*


    The Islamic Republic treats escalation and diplomacy as sequential phases in a single behavioral cycle. The regime secures
    survival buffers, demonstrates retaliatory capability, assesses adversary strain, and only then engages in genuine negotiation.
    This five-phase model -- derived from observed behavior across multiple crisis cycles -- explains why additional escalation
    is likely before real negotiation, why strikes accelerate rather than terminate diplomacy, and why the eschatological
    faction activates its sabotage precisely when genuine engagement begins. Current assessment: Iran is in Phase 2 (leverage
    demonstration), with strengthening Phase 3 indicators (adversary strain signals emerging from allied hesitation and internal
    US military debate). Phase 4 (genuine negotiation) has not arrived -- and the compressed timeline may not allow it before
    the military window opens. [->](https://hmehr.substack.com/p/the-doctrine-behind-the-escalation)

    '
- title: 'Brief #10 -- The Table After the Bombs'
  level: 3
  content: '*What post-strike negotiations actually look like.*


    Brief #6 asked what happens inside Iran after a strike. This brief asks what happens at the negotiating table. Three strike
    scenarios produce three different negotiating counterparts -- from the same people with more leverage (nuclear-only) to
    fragments without coherent authority (maximalist). The Pinochet Pivot intensifies post-strike: a damaged regime is more
    desperate, making its economic offers more tempting and Washington more susceptible. The 50,000 detainees become industrial-scale
    leverage. The eschatological faction''s narrative is validated by bombs while its political sabotage infrastructure remains
    untouched by military targeting. The worst outcome is a hollow deal signed under post-strike pressure that enriches the
    IRGC and collapses within years. [->](https://hmehr.substack.com/p/the-table-after-the-bombs)

    '
