  fill_note: >-
    NYT confirmed (March 4): MOIS operatives reached CIA indirectly through a third country's intelligence service. But: (1)
    Trump publicly rejected — "They want to talk. I said 'Too Late!'" (2) Araghchi on NBC (March 5) denied seeking ceasefire:
    "We don't see any reason why we should negotiate." (3) Tasnim (IRGC-affiliated) called NYT report "absolute lies and psychological
    warfare." (4) CNN: US officials insist no talks since nuclear negotiations collapsed. (5) Witkoff has not contacted Araghchi
    since strikes began. (6) Nearly a dozen countries have offered to mediate; none have produced "robust exchange of messages."
    Assessment: channel exists but is substantively dead. Wrong interlocutor thesis (Obs 010) confirmed in real time — MOIS
    pragmatist channel cannot commit IRGC; US won't engage anyway. Combined with command fragmentation (Obs 032), this produces
    the ceasefire paradox: even if both sides wanted to stop, no mechanism exists to execute it.
