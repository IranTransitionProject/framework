  why_critical: NOW CRITICAL — Nakhchivan claim/deny pattern, autonomous firing decisions, Vahidi appointment with unclear
    authorization, IRGC pressure on Assembly of Experts all confirm command fragmentation. Need verified mapping of who controls
    what.
  blocking_for:
