- id: G14-10
  description: >-
    Araghchi actual authority scope -- does he negotiate or transmit?
    Day 28 WARTIME UPDATE: Larijani killed ~Day 22. The authorization chain
    (Araghchi → Larijani → SNSC) is broken. Araghchi's authority scope is now
    a first-order question: does he report to Zolghadr? Does Zolghadr have
    any interest in diplomatic engagement? Iran denied negotiations after
    Trump's 48-hour ultimatum on power plants. If Araghchi has no authorizing
    principal for diplomacy, the diplomatic channel is functionally dead
    regardless of Araghchi's personal inclinations.
  priority: 1
  status: ELEVATED
  modules:
  - ITB-A
  - ITB-F
  why_critical: Larijani authorization chain means Araghchi may have zero independent negotiating authority.
  session_identified: 14
  cross_refs: []
  fill_note: >-
    Araghchi on NBC (March 5): "We are not asking for a ceasefire, and we don't see any reason why we should negotiate." Earlier
    wrote that a "unique deal" was lost due to an "'America Last' cabal." This is direct evidence of messaging authority —
    Araghchi is transmitting the hardliner line, not negotiating independently. Consistent with Larijani authorization chain
    hypothesis. However, MOIS backchannel bypassed Araghchi entirely, going through intelligence channels to CIA, suggesting
    Araghchi is not even the regime's primary diplomatic conduit under wartime conditions.
