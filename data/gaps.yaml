  why_critical: >-
    NOW CRITICAL — Nakhchivan claim/deny pattern, autonomous firing decisions, Vahidi appointment with unclear authorization,
    IRGC pressure on Assembly of Experts all confirm command fragmentation. Need verified mapping of who controls what.
  blocking_for:
  - ISA-SCENARIOS succession analysis
  session_identified: 8
  fill_note: >-
    QUANTITATIVE CORROBORATION (Session 23 — Factnameh 72-hour analysis): Three
    independent signals from Factnameh's 77K-post dataset: (1) Measurable drop in all
    50-channel activity during the 20-hour gap between US/Israeli confirmation of
    Khamenei death and IRIB's official announcement — regime media network went
    effectively silent; (2) 65.1% copy-paste rate across all channels for 72 hours —
    no original content, pure relay of whatever narrative became available; (3) Three
    non-coordinated narrative threads (Larijani pragmatist/dual-audience, IRGC hardliner/
    1988-style executions rhetoric, independent marja decrees) operating simultaneously
    with no coordination signal. The media coordination failure is the observable proxy
    for command fragmentation. If the strategic communications apparatus — which is
    directly managed and funded by regime institutions — could not coordinate a coherent
    message, the operational command structure is at least equally fragmented. This
    corroborates the Foreign Ministry "lost control over several units" admission (Obs 032).
