- id: CONTEXT
  title: CONTEXT AND FRAMING (Introduction, pp. vi-ix)
  content: |
    ### Regime Collapse Narrative

    The document frames January 2026 as the decisive turning point: a mass uprising ("Lion and Sun Revolution") met with regime violence killing "tens of thousands" of peaceful protesters. It treats the Islamic Republic as a failed state clinging to power through brutality, with collapse "increasingly plausible and indeed perceived by many as inevitable."

    Key contextual claims:
    - The September 2022 Mahsa Uprising, bazaar strike of December 2025, and January 2026 uprising represent an escalating revolutionary trajectory (2017, 2019, 2022, 2026)
    - Israel's post-October 2023 campaign substantially weakened Hamas/Hezbollah; fall of Assad isolated Iran
    - The "12-Day War of June 2025" inflicted significant damage on IRGC and nuclear program
    - Inflation exceeded 60% in 2025; collapse of Ayandeh Bank exposed banking sector fragility
    - Reza Pahlavi has emerged as "widely recognized leader of the Iranian people's uprising"
    - The document hedges: "Even if the regime's fall is delayed, partial, or uneven, the Emergency Phase logic still applies"

    > **[ITP NOTE]** The document treats clean regime collapse as primary scenario. Our ISA scenario work identifies this as the least likely transition pathway. Partial collapse, factional fragmentation during succession, and negotiated handover are more probable. The hedge sentence above is the only acknowledgment of this.

    ### Five-Pronged Strategy (Pahlavi Framework)
    1. Maximum pressure on the Islamic Republic
    2. Maximum support for the Iranian people
    3. Maximum defections from the regime
    4. Maximum organization of forces inside and outside Iran
    5. Planning for reconstruction (this document)
- id: IPP-EP_01
  title: 'IPP-EP.01: LEGAL FRAMEWORK'
  content: |
    ### Core Mechanism: The Hybrid Option

    Three legal frameworks evaluated:
    1. **Restorative** — repeal all IR laws, reinstate Pahlavi-era laws. Rejected: creates legal vacuum, impractical
    2. **Retaining** — keep all IR laws, defer reform. Rejected: fails to inspire hope, retains discriminatory laws
    3. **Hybrid** (recommended) — retain IR laws as default, but immediately repeal those conflicting with:
       - Iran's historical and national identity
       - The 1948 Universal Declaration of Human Rights
       - Progress of the Transitional System

    ### Implementation Mechanism

    The Leader of the National Uprising issues an official decree in three parts:
    - **Part I:** Abolish the IR Constitution; formally dissolve the regime; establish Transitional System
    - **Part II:** Declare existing laws/institutions remain in force except those listed in Part III
    - **Part III:** Repeal specific laws/institutions; replacement laws drawn from Pahlavi Imperial era, updated where needed; vest Transitional Mehestan with authority to enact new laws

    ### Comparative Analysis: Brexit as Model

    The document argues that Iran's transition is unique — no direct analogue in Soviet, Iraqi, Tunisian, or Egyptian transitions because Iran's 1979 revolution altered the legal system ideologically, not just politically. The closest analogy is Brexit's transition framework: EU laws retained as domestic law on Exit Day, with specific EU-membership-symbolizing laws repealed immediately.

    > **[ITP NOTE]** The Brexit analogy is creative but limited. Brexit involved a functioning democracy voluntarily reorganizing its legal framework. Iran's transition involves a collapsing authoritarian system with active armed factions, no functioning democratic institutions, and a population with 45 years of legal experience under a completely different framework. The legal continuity principle is sound; the implementation context is radically different.
- id: IPP-EP_02
  title: 'IPP-EP.02: POLITICAL FRAMEWORK'
  content: |
    ### Pre-Fall Institutions
    - **National Uprising Council:** Advisory/policy body for Reza Pahlavi (members inside and outside Iran; names withheld for security)
    - **Temporary Executive Team:** Implementation arm (same secrecy)

    ### Post-Fall Transitional System (Three Pillars)

    **A. Transitional Mehestan (Legislature)**
    - Members appointed by Leader of the National Uprising; "shall represent the diversity of the unified Iranian nation"
    - Responsibilities: identify laws for repeal, enact temporary replacements, approve national budget, set Constituent Assembly parameters
    - Appoints panel of 5 distinguished jurists for legislative consultation
    - Dissolved when elected Mehestan takes office

    **B. Transitional Government (Executive)**
    - Head appointed/removed by Leader of the National Uprising after consulting Mehestan
    - Ministers appointed by head of government, approved by Mehestan (absolute majority)
    - Exception: Minister of Defense appointed by head of government, approved by Leader
    - Senior military commanders appointed by Leader directly

    **C. Transitional Divan (Judiciary)**
    - Head appointed/removed by Leader of the National Uprising after consulting Mehestan
    - Transitional justice mechanism for gross human rights violations

    ### Structural Reforms in Leader's Decree (Art. 6)
    - Remove "Islamic Republic" from Iran's name
    - Restore Lion and Sun flag; replace anthem with "Ey Iran"
    - Dissolve: Office of Supreme Leader, Assembly of Experts, Expediency Council, Guardian Council
    - Dissolve IRGC; integrate armed wing into national Army; transfer economic/cultural wings to government; intelligence wing to new National Intelligence and Security Service (NISS)
    - Dissolve: IR Court, Special Clerical Court, Morality Police, Supreme Council of Cultural Revolution, Supreme Council of Cyberspace
    - Transfer Attorney General from judiciary to executive (Ministry of Justice)
    - Ensure independence of Iranian Bar Association
    - Dissolve IR Broadcasting; reestablish National Iranian Radio and Television
    - Establish transitional justice mechanism

    ### Succession Provision (Art. 7)
    If Leader of the National Uprising unable to fulfill duties: a "Temporary Regency Council" of three members (two from Mehestan + one from Transitional Government) acts in his place.

    ### Timeline to Democracy
    - Within 4 months: referendum on system of government (parliamentary monarchy vs. republic)
    - After referendum: election of Constituent Assembly to draft new Constitution
    - Referendum on new Constitution
    - Election of Mehestan (parliament)
    - Transfer of power to elected government; dissolution of Transitional System
    - Total expected duration: 18-24 months (limited extensions permitted)

    ### Checks and Balances
    - Mehestan can impeach head of government (2/3 majority + Leader approval)
    - Leader can dissolve Mehestan only once; must appoint new members within 30 days
    - Constitutional constraints on Leader's authority enumerated (Art. 21): seven "immutable foundations" including territorial integrity, secular democracy, separation of religion/state, UDHR compliance, free elections, independence of judiciary, freedom of press/expression

    > **[ITP NOTE — CRITICAL]** The entire framework rests on Pahlavi's legitimacy as transition leader. Our D module identifies opposition fragmentation (monarchist, republican, federalist, leftist) as "the single biggest transition risk after regime security forces." The document's architecture has no fallback if this assumption fails. The Mehestan composition is appointed, not elected — its legitimacy derives entirely from the Leader's authority, which itself derives from a claim of popular mandate. If that mandate is contested, the entire institutional chain collapses. No mechanism exists for alternative leadership emergence.

    > **[ITP NOTE]** No ethnic/minority governance mechanism beyond the promise of "diversity." Our D13 flags Kurdish, Baloch, Arab, Azeri regions (~15-20M people) as requiring visible, structural inclusion. This is a Tehran-centric design.
- id: IPP-EP_03
  title: 'IPP-EP.03: MILITARY AND SECURITY'
  content: |
    ### Core Principles
    - No mass purges (explicit lessons from Iraq de-Ba'athification and 1979 military collapse)
    - Individual criminal responsibility, not organizational affiliation
    - Maximum reintegration, retraining, phased restructuring
    - Continued salary payments as top priority to prevent defection/unrest
    - Reform, not retribution

    ### Institutional Restructuring Table (Key Decisions)

    **Dissolved entirely:** Ministry of Intelligence, Basij Organization, Basij Intelligence, Quds Force, Quds Force Intelligence, IRGC Intelligence, Morality Police, Office of Supreme Leader Military Affairs

    **Dissolved and integrated into national army:** IRGC Aerospace Force, IRGC Ground Force, IRGC Navy, IRGC Counterintelligence

    **Retained after vetting:** Artesh (Ground, Navy, Air Force), Artesh Counterintelligence, National Organization for Passive Defense, all standard law enforcement (FARAJA, Traffic Police, Border Guard, Anti-Narcotics, Criminal Investigation, Immigration, Interpol Iran)

    **Restructured (repressive component removed, personnel screened):** FARAJA Intelligence, FARAJA Special Units, NOPO Special Operations, Cyber Police (FATA)

    **Reformed:** General Staff of Armed Forces (top officials removed, defectors may remain, ideological forces retired), Military Service Organization (reform + professionalization)

    ### Phased Timeline
    - **Phase 1 (0-3 months):** Stabilize crisis, declare army neutrality, secure borders/infrastructure, launch personnel registration
    - **Phase 2 (3-12 months):** Establish NISS, reform police with human rights focus, deploy Community Oversight Boards, integrate vetted former IRGC, draft law prohibiting military politics
    - **Phase 3 (12-24 months):** Full civilian control, complete IRGC integration, establish National Defense Studies Center, prepare for handover to elected government

    ### Pre-Fall Operations (Phase 0)
    - **National Defection and Cooperation Platform (NDCP):** Secure comms for defectors; real-time vetting including biometric (facial recognition); placement system for transitional roles
    - **Secure Command Continuity Protocol:** Multi-region bunkers, satellite comms, hidden data vaults with succession orders
    - **Credentialing and Mapping Cell:** AI/geospatial fusion to map IRGC/MOIS assets, tunnels, airbases, proxies; predictive modeling of power vacuum zones
    - **Regional Threat Fusion Center:** Joint monitoring for cross-border threats, proxy monitoring (PMF, Hezbollah)

    ### Key Challenges Acknowledged
    - Sabotage by regime loyalists (solution: vetting, revolutionary cells, internal reporting)
    - Security vacuum / parallel militias (solution: rapid deployment, temporary curfews)
    - Foreign interference (solution: regional security coalition)
    - Personnel shortage of democratically loyal officers (solution: international training)
    - Separatist threats in border regions (solution: territorial integrity doctrine + inclusive citizenship)

    > **[ITP NOTE — CRITICAL]** This section treats the IRGC as a military organization to be dissolved and its personnel integrated. It does NOT address the parallel society (A9): 2-10 million people in gated compounds, Shahed schools, university networks, and economic patronage. "Dissolving the Basij" and "integrating IRGC forces" without a population absorption plan for the parallel civilization is the single biggest gap in this document. Our A9 analysis shows economic dependency — not ideology — is the binding agent, meaning economic alternatives can disaggregate the system. But this requires a deliberate reintegration strategy the document doesn't contain.

    > **[ITP NOTE]** No mention of the eschatological faction (A10). "Regime loyalists" is treated as a homogeneous category. Our analysis shows a specific theological faction (Mirbagheri/Paydari/MASAF) with veto capacity, succession positioning, and motivations that cannot be addressed through vetting or salary guarantees. Their utility function includes theological payoffs not reducible to material incentives.

    > **[ITP NOTE]** The NDCP (defection platform) and revolutionary cells are presented as operational realities. No evidence is provided that these exist at scale or have meaningful penetration of the security apparatus. The January 2026 internet blackout context makes diaspora-to-interior coordination extremely difficult.
- id: IPP-EP_04
  title: 'IPP-EP.04: FOREIGN POLICY'
  content: |
    ### Core Principles
    - End uranium enrichment and heavy-water activities; full IAEA transparency
    - Strategic US partnership (modeled on pre-1979 relationship)
    - Formal recognition of Israel ("Cyrus Accord" framework)
    - Non-interventionist regional strategy
    - Balanced relations with China and Russia
    - Pragmatic, national-interest-driven (not ideological)

    ### First 100 Days Action Plan
    - **Week 1:** Official letters to world powers; recognize Israel; request sanctions negotiations; appoint transition envoys
    - **Month 1:** Open diplomatic channels; formal talks with US, EU, Israel, China, Russia, neighbors; begin sanctions removal process; accept IAEA inspections
    - **Months 2-3:** Draft MOUs on trade, non-aggression, security cooperation; launch regional initiatives; sign preliminary US/Israel agreements

    ### Neighboring Countries Strategy
    - Official diplomatic communications to all neighbors on Day 1 with reciprocal commitments
    - Country-specific sections for Iraq, Afghanistan, Pakistan, Turkey, Azerbaijan, Armenia, Turkmenistan, Gulf states
    - Iraq: neutralize IRGC-backed militias, secure border, joint anti-terrorism cooperation
    - Afghanistan: address refugee crisis (~3.5 million Afghans in Iran), counter-narcotics, border security
    - Israel: normalization as "cornerstone of regional strategy" — counterterrorism, tech partnerships, water management cooperation

    ### MFA Institutional Reform
    - Structural reorganization within 60 days
    - Economic Diplomacy Task Force (EDTF) for investment attraction
    - Digital diplomacy platform
    - Iran-US Dialogue Center for trade, science, education

    > **[ITP NOTE]** This section is maximally optimistic. Our F11 analysis shows that multiple regional actors (Qatar, UAE, Turkey, China, Russia, Iraq/PMF) are structural beneficiaries of Iran's current sanctioned/isolated equilibrium. Their economic models depend on conditions that exist only when Iran is degraded. The document assumes these actors will welcome normalization — F11 demonstrates they have quantifiable incentives to slow-walk or undermine it.

    > **[ITP NOTE]** The Israel normalization plan is politically bold but operationally fragile. It assumes the eschatological faction's theological opposition can be simply overridden by political decree. Our A10 analysis shows this faction treats normalization with Israel as cooperation with the Dajjal — it would be a casus belli for theological resistance, not merely a policy disagreement.
- id: IPP-EP_05
  title: 'IPP-EP.05: GOVERNMENT ESSENTIAL FUNCTIONS'
  content: |
    Brief section (2 pages) covering continuity of basic services: healthcare, education, water, electricity, public order, and social welfare during transition. Essentially a placeholder establishing that these functions must not be interrupted.
- id: IPP-EP_06
  title: 'IPP-EP.06: MACROECONOMIC GOVERNANCE'
  content: |
    ### Three Pillars: Fiscal, Banking/Monetary, Financial Markets

    **Fiscal Policy:**
    - Secure CBI control (fiscal agent + monetary authority dual role)
    - Maintain government payments: pensions, subsidies, wages (~50% of GDP is private consumption dependent on public transfers)
    - Capital controls on public institutions to prevent flight
    - Domestic bond issuance for short-term gaps
    - Seek international recognition to unlock $120-150 billion in frozen reserves
    - Re-engage with IMF, World Bank, FATF, credit rating agencies

    **Administrative Streamlining:**
    - Dismantle ideological institutions (including Securities and Exchange High Council)
    - Phase out mandatory Islamic finance frameworks
    - Bonyads: downsize, bring under formal oversight, subject to taxation
    - Defer major structural reforms to elected government

    **Banking Stabilization:**
    - Appoint new CBI Governor, interim Finance Minister, bank administrators
    - CBI independence for interest rates and anti-inflation policy
    - Consolidate multiple exchange rates into dual-rate transitional system
    - 100% deposit insurance for first 100 days (with withdrawal limits)
    - Temporary capital controls; freeze regime-linked accounts
    - Flag transactions above $1 million
    - Coordinate with UAE, China to freeze Iranian public assets abroad
    - Hire external auditors for comprehensive bank audits
    - Dual mandate: price stability + financial stability

    **Financial Markets:**
    - Temporary trading halt (5-10 days)
    - Reopen with circuit breakers and position limits
    - Independent market regulator
    - Prohibit insider transfers and fire sales by regime-linked entities

    **Unregulated Financial Sector:**
    - Joint Financial Task Force within 2 weeks
    - Mandatory registration for large/cross-border payments
    - Redirect legitimate transfers through regulated banks
    - FATF compliance pathway

    **Privatization:**
    - Not feasible in emergency phase
    - Focus on: securing public property, transparency, operational continuity
    - SOE inventory including government, semi-government, foundations, religious endowments
    - Political appointees removed; interim technocrat management
    - Forensic audits of major SOEs and foundations
    - Strategic framework for future privatization (phased, transparent, no regime loyalist enrichment)

    **Pensions:**
    - Continue collecting contributions (PAYG system)
    - Maintain payment flow with inflation adjustments
    - Emergency government funding if collection disrupted
    - World Bank recommendations: end pension fund lending to government; halt asset-transfer-in-lieu-of-debt; reinstate High Council for Social Security

    > **[ITP NOTE]** This is the most technically competent section. However, the assumption of "widespread political consent for the Transitional Government" and "sufficient support among mid-level managers" is doing enormous load-bearing work. Our analysis of the IRGC economic empire shows that the Bonyads/Setad/Khatam al-Anbiya are not merely inefficient state enterprises — they are the economic infrastructure of the parallel society (A9.4). "Bringing them under formal oversight" without a plan for the millions of economic dependents is the macro version of the military section's parallel society gap.
- id: IPP-EP_07
  title: 'IPP-EP.07: NATIONAL ASSETS RECOVERY (PBAD)'
  content: |
    ### Scope
    Assets under direct control of Supreme Leader: Bonyads, Setad (SEFE), Astan Quds Razavi, non-military IRGC corporate holdings. Ministry/government agency assets covered in Military/Security chapter.

    ### Operational Timeline
    - **H-Hour to H+72:** Rapid asset seizure and freezing with maximum operational security. Physical control of Central Bank, Bonyad headquarters, data centers. Priority on liquid assets (cash, crypto, electronic funds) and document preservation.
    - **H+72 to Day 30:** Systematic domestic inventory, forensic imaging of databases, international legal notifications (FATF, Interpol, partner nations)
    - **Day 30+:** Recovery and repatriation operations, international court filings

    ### Key Targets (Detailed Institutional Profiles)
    - **EIKO (Setad Ejraiye Farmane Emam):** Supreme Leader's personal economic empire; estimated $95 billion+; real estate, petrochemicals, telecoms, finance
    - **Bonyad Mostazafan:** "Foundation of the Oppressed"; massive industrial/agricultural/real estate holdings
    - **Astan Quds Razavi:** Mashhad shrine endowment; estimated $15 billion+; tourism, agriculture, industry
    - **Khatam al-Anbiya:** IRGC construction arm; infrastructure, petrochemicals, mining; billions in contracts
    - **IRGC Cooperative Foundation:** Insurance, financial services, manufacturing for IRGC families

    ### Mega-Debtor Targeting
    Named individuals with estimated offshore holdings and jurisdictional exposure. Includes former IRGC commanders, Bonyad directors, and regime-linked businessmen.

    ### International Jurisdictions
    Focus: UAE (Dubai), Canada, Turkey, Switzerland, Luxembourg, Malaysia, China, India, Georgia, UK, Singapore.

    ### Risks Acknowledged
    - Personnel defection with assets
    - Sabotage by IRGC loyalists (especially digital systems)
    - International non-cooperation (especially China, Russia)
    - Asset concealment through complex multi-layered holding structures

    > **[ITP NOTE]** This is operationally detailed and reflects genuine insider knowledge of the regime's financial architecture. The Khatam al-Anbiya profiling aligns with our A9.4 documentation of the IRGC economic empire. However, the document treats asset recovery purely as a financial/legal operation — it doesn't address that these assets are the employment base for millions of people (the parallel society's economic binding mechanism). Seizing Khatam al-Anbiya without a workforce transition plan converts economic dependents into political enemies overnight. Our A9 "hollowness finding" cuts both ways: economic dependency is the vulnerability, but only if the economic intervention provides alternatives, not just seizure.
- id: IPP-EP_08
  title: 'IPP-EP.08: ENERGY'
  content: |
    ### Core Structure
    Transitional Energy Command Unit (TECU) as central authority, with Regional Command Units (RCUs) at provincial level. Merges Ministry of Petroleum and Ministry of Energy (Niroo) into unified structure by end of Phase 5.

    ### Phases
    - **Phase 0 (Pre-Day 1):** TECU formation, personnel mapping, critical asset maps, SCADA isolation procedures, Digital Twin of national grid and refineries
    - **Phase 1 (Days 1-10):** Senior personnel suspension, Harasat units seized, SCADA lockdown, anti-drone defenses at top 20 sites
    - **Phase 2 (Days 11-40):** National technical audit, restore priority energy flows (hospitals, water, urban centers), smart fuel vouchers pilot, contract review
    - **Phase 3 (Days 41-100):** Transparency dashboard, institutional security reform, international observer access, nuclear evaluation taskforce with IAEA
    - **Phase 4 (Days 101-140):** Workforce reform, infrastructure upgrade planning
    - **Phase 5 (Days 141-180):** TECU-to-MoE handover, international investment framework, public review

    ### Nuclear
    - Suspend all operations
    - Secure fissile materials
    - Initiate IAEA inspections of Natanz, Fordow, Isfahan
    - Assess Bushehr safety
    - Environmental contamination audits

    > **[ITP NOTE]** Solid technical planning. The SCADA isolation procedures and anti-drone defense prioritization are realistic. Key assumption risk: "basic security and territorial control have been achieved in most energy-producing regions" — Khuzestan (oil), Bushehr (nuclear), Sistan-Baluchestan (gas) are exactly the regions where security control is most contested and ethnic dynamics most volatile.
- id: IPP-EP_09
  title: 'IPP-EP.09: INDUSTRY'
  content: |
    ### Structure
    Transitional Industrial Recovery Authority (TIRA) in three tiers:
    - **Tier 1 (Immediate):** Food, health, defense-related manufacturing
    - **Tier 2 (Stabilization):** Construction materials, automotive, mining
    - **Tier 3 (Planning):** High-tech and value-added sectors (post-180 days)

    Key challenges identified: IRGC-controlled conglomerates (Khatam, Bonyad Mostazafan, EIKO) have senior regime-loyal management; removing them may trigger local sabotage. Mid-level administrators may slow implementation.
- id: IPP-EP_10
  title: 'IPP-EP.10: CYBERSECURITY'
  content: |
    ### Structure
    Transitional National Cybersecurity Task Force from Day 0. Composed of vetted domestic specialists, diaspora experts, and retained institutional personnel.

    ### Key Features (Most Technically Sophisticated Section)
    - **Defense-in-depth for insider risk:** Acknowledges that rapid personnel replacement is impractical; focuses on reducing any individual's ability to cause systemic harm
    - Privileged access governance, access pathway restriction, continuous monitoring, change control (dual authorization), segregation of duties
    - **Phased approach:**
      - Phase 0 (Pre-Day 1): Establish coordination authority, prepare sector-specific playbooks
      - Phase 1 (Days 1-10): Credential control, external network isolation, passive monitoring deployment
      - Phase 2 (Days 11-40): Network segmentation (zone-and-conduit), identity-based access, blackstart capability validation
      - Phase 3 (Days 41-100): Secure edge gateways, zero-trust access models, pilot substation automation
      - Phase 4 (Days 101-130): Institutionalize permanent cyber defense
    - **International procurement framework** for tools and expertise with strict oversight
    - **Telecommunications:** Restore secure network operations, prevent surveillance abuse, replace opaque regime control structures

    > **[ITP NOTE]** This section shows genuine technical expertise. The insider risk management approach (defense-in-depth rather than purge) is more sophisticated than the military section's approach to personnel. The SCADA/OT security prioritization reflects real understanding of Iran's infrastructure vulnerabilities. Cross-reference with our ITB-H (Information Environment) for the regime's existing cyber capabilities and the NIN (National Information Network) control architecture.
- id: IPP-EP_11
  title: 'IPP-EP.11: ENVIRONMENT'
  content: |
    Acknowledges Iran at "brink of ecological collapse" — water scarcity, air/soil pollution, land subsidence, deforestation, wetland loss, biodiversity decline. Establishes Transitional Environmental Governance Authority (TEGA). Prioritizes immediate pollution threats with public health risk, stakeholder engagement, international cooperation. Separate Water chapter for the water crisis.
- id: IPP-EP_12
  title: 'IPP-EP.12: WATER'
  content: |
    Describes Iran as in "severe stage of water bankruptcy." Establishes Transitional Water Governance Sector (TWGS). Focuses on ensuring drinking water/sanitation access, securing critical infrastructure, transparent governance. Acknowledges water as a national security issue with territorial stability implications.

    > **[ITP NOTE]** Our A9/C2 coupling analysis shows that IRGC's Khatam al-Anbiya construction projects (dams, tunnels, water infrastructure) served as dual-use procurement cover for underground military facility construction. The water crisis is partly a consequence of IRGC resource allocation choices. This section doesn't engage with that structural linkage.
- id: IPP-EP_13
  title: 'IPP-EP.13: HEALTHCARE'
  content: |
    Evidence-based framework informed by countries that navigated national emergencies. Priorities: continue insurance premium collection (SSI, IHI, AFHI), maintain current healthcare subsidies (~1.5% of GDP), prevent supply chain disruption, targeted reforms for affordability/access.
- id: IPP-EP_14
  title: 'IPP-EP.14: EDUCATION'
  content: |
    ### Emergency Phase (Months 0-6)
    - Keep schools open; pay teachers
    - End gender segregation (initially in primary schools)
    - Make hijab optional at all levels
    - Remove IR visual symbols and ideologically driven content
    - Depoliticize teacher recruitment (merit-based, not ideological)
    - In-service training for mixed-gender integrated classrooms
    - Repeal laws mandating religious indoctrination
    - Independent task force for curriculum audit (educators, academics, historians, psychologists)

    > **[ITP NOTE]** "De-ideologization" is presented as a policy step (remove symbols, change textbooks, retrain teachers). Our A8 analysis shows the theological architecture runs far deeper: the ISU/IHU educational pipeline, Shahed school network (~405K students), Basij university track — these are not "ideological content" to be removed but an entire parallel education system (A9.2). This section addresses the mainstream education system but not the parallel one. What happens to Shahed schools? To ISU/IHU graduates? To the Basij student network? These are the pipeline that produces the next generation of the parallel society.
- id: ITP-ASSESSMENT
  title: ITP ANALYTICAL ASSESSMENT
  content: |
    ### Strengths
    1. Legal framework (Hybrid Option) is sound, creative, and implementable
    2. Military section explicitly avoids de-Ba'athification mistake
    3. Macroeconomic governance is technically competent with realistic sequencing
    4. National assets recovery shows genuine insider knowledge of regime financial architecture
    5. Cybersecurity section is the most technically sophisticated — defense-in-depth approach to insider risk
    6. Phased timelines across all sectors show institutional planning discipline
    7. Acknowledgment that transition may take 18-24+ months is realistic

    ### Critical Gaps (ITP-Identified)
    1. **No parallel society framework (A9).** The IRGC is treated as a military org, not a civilization of 2-10M people. No plan for compound populations, Shahed school networks, economic dependents.
    2. **No eschatological faction analysis (A10).** "Regime loyalists" treated as homogeneous. The Mirbagheri/Paydari/MASAF faction — with theological motivation, institutional veto capacity, and succession positioning — is invisible.
    3. **Clean collapse assumption.** Partial collapse, factional fragmentation, messy succession not modeled despite being more probable.
    4. **Pahlavi legitimacy as single point of failure.** Entire governance architecture depends on one person's accepted authority. No fallback for contested leadership.
    5. **No ethnic/peripheral governance architecture.** Tehran-centric design with no decentralization mechanism for Kurdish/Baloch/Arab/Azeri regions.
    6. **Theological architecture treated as surface contamination (A8).** "De-ideologization" as policy step misses the depth of the ISU/IHU/taqiyyah institutional framework.
    7. **NDCP/revolutionary cells asserted without evidence.** Pre-fall operational capacity assumed but not demonstrated. Internet blackout context makes verification impossible.
    8. **Regional equilibrium beneficiaries (F11) not modeled.** Foreign policy assumes willing international partners; multiple actors have structural incentives against normalization.

    ### Relationship to ITP Analysis
    This document operates at a different analytical level: operational planning vs. structural diagnosis. It answers "what do you do on Day 2 if Day 1 goes well" — but our project's core finding is that Day 1 is unlikely to go as this document assumes. The gaps are precisely where our analysis adds value. The document is not a competitor; it is a complement — useful for the operational layer once the structural dynamics are correctly understood.

    ### Archival Value
    High. The institutional restructuring tables, economic stabilization sequences, and cybersecurity frameworks are reference-grade material for any transition scenario, regardless of political framework. The national assets section provides the most detailed public accounting of regime economic architecture available.

