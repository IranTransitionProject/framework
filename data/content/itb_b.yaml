- id: B1
  title: Nuclear Program Status (Post-Midnight Hammer)
  content: "* **Background:** US bombed Fordow, Natanz, and Isfahan in June 2025 (\"Operation Midnight Hammer,\" 12-day war). Ceasefire held since. [Fact]\n* **Reconstruction:** Iran rebuilding at Natanz,\
    \ Fordow, Isfahan. Satellite imagery (Feb 2026) shows roofs built over damaged buildings at Isfahan and Natanz to block satellite observation. All three tunnel entrances at Isfahan now buried under\
    \ soil — mirrors defensive measures taken before Midnight Hammer. [Fact — satellite imagery, ISIS reports]\n* **Pickaxe Mountain:** Clandestine facility ~1 mile south of Natanz. Security wall built\
    \ around perimeter, tunnel networks expanded. Feb 2026 imagery shows active hardening of tunnel entrances against future strikes. [Fact — satellite imagery]\n* **HEU inventory:** ~440 kg of 60% enriched\
    \ uranium referenced in diplomatic discussions. IAEA confirms material has not been verified as moved from original sites. Some or all may be buried under rubble. [Fact — IAEA DG Grossi, Feb 2026 Munich]\n\
    * **Total stockpile:** 9,247 kg enriched to various levels up to 60%, per Feb 2025 IAEA report. [Fact — IAEA]\n* **IAEA access:** Denied since strikes. Grossi stated (Feb 2026): \"If the program were\
    \ being rebuilt right now, would you know? No, because we are not getting access to these places.\" [Fact — Foreign Policy interview, Feb 18, 2026]\n* **Breakout timeline (UPDATED):**\n    * **Pre-Midnight\
    \ Hammer:** Less than 1 week for enough weapons-grade HEU for one weapon (DIA, May 2025). IAEA assessed enough material for 9 weapons with further enrichment. [Fact — High]\n    * **Post-strike (Jul\
    \ 2025):** 1–3 months estimated (intelligence assessments). [Inference — Med]\n    * **Current trajectory:** Continued reconstruction could return breakout windows to 1–2 weeks by mid-2026, per National\
    \ Interest analysis (Feb 2026). [Inference — Med, single-source]\n    * **Technical restoration:** 12–18 months to restore significant enrichment capacity if reconstruction continues. [Inference — Med]\n\
    \    * **Weaponization gap:** IAEA reports Iran does not yet have a verified viable weapon design or suitable detonation system. Weaponization would take additional months to years. Knowledge cannot\
    \ be unlearned. [Fact — High]\n    * **Key uncertainty:** Without IAEA inspector access, all current assessments rely on satellite imagery and SIGINT — inadequate for determining breakout timelines\
    \ inside hardened underground facilities. [Fact — High]\n"
- id: B2
  title: Missile Inventory
  content: '* **Pre-war arsenal:** Estimated ~2,500 ballistic missiles. Strategic goal was 8,000 for saturation capability against Israeli defenses. [Fact/Inference — Med, Alma Center]

    * **War damage:** Israeli strikes destroyed ~two-thirds of ballistic missile launchers and between one-third to one-half of the missile arsenal. [Inference — Med, Israeli assessments]

    * **Current inventory:** Shrunk from ~2,500 pre-war. Iran attempting to rebuild toward 2,000 missile stock. [Inference — Med, Alma Center Feb 2026]

    * **Solid fuel crisis:** Medium-range ballistic missile array experienced critical attrition. Underground infrastructure survived and permits reconstruction if Iran obtains missing raw materials. Solid-fuel
    production capacity is the bottleneck. [Inference — Med]

    * **Khorramshahr-4:** Long-range ballistic missile deployed in underground facilities. [Fact]

    * **Reconstruction:** Missile complexes rebuilt at Tehran, Kermanshah, Semnan, Gulf coast. [Fact — satellite imagery, Times of Israel]

    * **Ilam Province launch:** Iran reportedly conducted a missile launch near western border with Iraq, Dec 30, 2025. [Fact — Iranian media, unverified purpose]

    * **Red line:** Missiles declared "nonnegotiable" — Shamkhani (Feb 12), Takht-Ravanchi (Feb 15). [Fact]

    * **Chinese route:** Reports indicate Iran seeking to obtain missing missile raw materials via Chinese supply chains. [Inference — Low, Alma Center]

    * **FM Araghchi claim:** Stated Iran has "reconstructed everything that was damaged" — likely overstated for negotiating leverage. [Fact — statement; Inference — assessment]

    '
- id: B3
  title: Foreign Militia Deployment (Domestic)
  content: '* Iraqi PMF, Lebanese Hezbollah remnants, Pakistani Liwa Zainabiyoun, Afghan Liwa Fatemiyoun deployed against Iranian civilians during Jan 2026 protests. [Fact]

    * **Scale:** ~5,000 Iraqi and Afghan fighters deployed domestically (Jan 2026). An additional 800 foreign militia members reportedly imported specifically for protest suppression. [Fact/Inference —
    Med, multiple sources]

    * **Arabic-speaking mercenaries:** Reports of Arabic-speaking forces among repression units, distinct from known militia groups. [Inference — Low, unverified reports]

    * **Assessment:** Willingness to use foreign militias against own population signals internal security force strain and massive legitimacy cost. Historically unprecedented for Iran. [Inference — Med]

    '
- id: B4
  title: Domestic Repression Infrastructure
  content: '* **Internet blackout:** Imposed Jan 8, 2026. Chinese surveillance technology (facial recognition, monitoring tools). Remains in force with limited restoration as of mid-Feb. [Fact]

    * **Casualty figures (UPDATED — Jan 2026):**


    | Source | Killed | Arrested | Notes | Confidence |

    |--------|--------|----------|-------|------------|

    | Iranian government (Jan 21) | 3,117 | — | Published partial list of 2,986 names Feb 1; list lacks time/place/circumstances | [Fact] |

    | HRANA (Feb 5) | 6,964 confirmed (of 18,694 total cases) | 53,000+ | 6,473 confirmed as protesters; 11,730 cases under review | [Fact — Med] |

    | Iran International (Feb 3) | 6,634 (independent list) | — | Names, photos, cities, circumstances documented; <100 overlap with govt list | [Fact — Med] |

    | Leaked Ministry of Health | 30,000–36,500 | — | Reported by Time, Guardian, Iran International for Jan 8–9 specifically | [Inference — Low] |


    * **Methods:** Live ammunition, military-grade weapons targeting vital body parts (faces, chests, groins — documented by ophthalmologist open letter and 75+ X-rays/CT scans). Pellet guns causing mass
    blindness. Reports of chemical weapons use (Jan 17 — forces in hazmat suits). Reports of unknown substances injected into detainees, linked to deaths in custody. [Fact — Med, multiple sources]

    * **Mass graves:** Guardian reported regime concealing deaths through mass burials (Jan 27). [Fact — single-source]

    * **Professional class repression:** Doctors arrested for helping protesters. Photojournalists raided. [Fact — CNN, Iran International]

    * **Judicial posture:** Judiciary chief Mohseni Ejei: "zero leniency for rioters," "maximum" penalties, "do it now." Protesters excluded from Revolution anniversary pardons. AG labeled protesters "enemies
    of God" (death penalty charge). 18-year-old wrestling champion Saleh Mohammadi sentenced to public execution in Qom. [Fact]

    * **Pre-planning:** Former MOIS official claims long-term preparation for massacre began in 2022, including sniper position marking, ideological training to kill, and infiltration of protests. [Inference
    — Low, single source]

    '
- id: B5
  title: Artesh (Regular Armed Forces)
  tags:
  - PRIORITY 1 GAP
  - PARTIALLY FILLED
  content: '* **Force size:** ~420,000 personnel across ground, naval, air, and air-defense forces. [Fact — Med]

    * **Distinct from IRGC:** Conventional military, broader social recruitment base, less ideologically committed. [Fact — Med]

    * **Jan 10, 2026 statement:** Artesh issued statement pledging to defend "national interests" and "strategic infrastructure" under Supreme Commander-in-Chief''s command. Accused Israel and "hostile
    terrorist groups" of undermining security. [Fact]

    * **Artesh commander Gen. Amir Hatami (Jan 7):** Warned Iran views "hostile rhetoric" as a threat and would respond. [Fact]

    * **INSS assessment (Feb 2026):** "No indications of significant defections inside Iran''s regular armed forces." [Fact — INSS, Israeli think tank]

    * **CTP-ISW analysis:** Artesh is "generally less ideological and more representative of the Iranian population than the IRGC, which increases the risk that Artesh members could defect." Deployment
    of Artesh for crowd control would indicate bandwidth constraints — regime would not deploy Artesh unless "absolutely had to." [Inference — Med, CTP-ISW]

    * **Unclear deployment:** It is unclear what role, if any, the Artesh played in the Jan 2026 crackdown. No confirmed reports of Artesh units directly firing on protesters. [Uncertain]

    * **Post-war leadership turmoil:** Ahmad Vahidi removed from Armed Forces General Staff deputy chief position (Dec 2025) due to internal disputes with Artesh leadership over post-war air defense priorities,
    including Vahidi''s opposition to acquiring airborne early warning systems. Vahidi then appointed IRGC deputy commander — indicating Khamenei is struggling to cohere new generation of military leaders
    after war killed many in IRGC Command Network. [Fact — Critical Threats, Dec 31]

    * **Assessment:** The Artesh issued loyalty statements but the statements were framed around national defense, not explicitly endorsing the massacre of protesters. No confirmed defections, but no confirmed
    direct participation in anti-protest violence either. The Artesh remains the key variable in Trap 2 (Security Transition Paradox) — its posture during a succession crisis cannot be predicted from current
    data. [Inference — Med]

    * **[REMAINING GAP: Artesh unit-level loyalty signals, internal dissent, and specific force posture during Jan 8–9 massacre remain unverifiable under blackout conditions.]**

    '
- id: B6
  title: IRGC Internal Dynamics Post-War
  tags:
  - PRIORITY 1 GAP
  - PARTIALLY FILLED
  content: '* **Leadership decapitation:** June 2025 strikes killed IRGC Commander-in-Chief Hossein Salami and numerous senior commanders in the IRGC Command Network. [Fact — High]

    * **New IRGC commander:** Mohammad Pakpour appointed as Salami''s successor by Khamenei. [Fact]

    * **Vahidi elevation:** Ahmad Vahidi appointed IRGC deputy commander Dec 27, 2025. Former Quds Force commander (1988–98), linked to 1994 AMIA bombing (INTERPOL red notice), close to Mojtaba Khamenei.
    [Fact]

    * **Naqdi removal:** Mohammad Reza Naqdi quietly removed from a command position. Delayed acknowledgment, conflicting references, and absence of formal handover suggest internal sensitivities. [Fact
    — NCRI, Oct 2025]

    * **Factional structure:** Analysts describe IRGC as "not monolithic conservative bloc but rather diverse power centers with competing interests." Hardline factions advocate maximum repression; pragmatic
    elements may recognize prolonged instability threatens IRGC''s own economic assets. [Inference — Med]

    * **Yellow state of emergency:** IRGC declared a yellow state of emergency in early Jan 2026 — short of red (comprehensive martial law) but indicating enhanced mobilization. [Inference — Low, unverified
    source]

    * **Provincial rotation:** Reports that Tehran rotated more loyal IRGC contingents from other provinces to replace units showing signs of dissent — indicating localized moral and psychological strain
    on some Basij and provincial IRGC units. [Inference — Med, Stimson Center]

    * **Capital flight signal:** Digital forensic data tracked >$400 million in Tether moving out of Iran by mid-level regime officials between Dec 2025 and Jan 2026. [Inference — Low, single source]

    * **Succession intersection:** Vahidi''s closeness to Mojtaba Khamenei suggests succession planning intersects with IRGC command restructuring. [Inference — Med]

    * **Assessment:** IRGC senior leadership holds, but the institution is in a post-decapitation reconstitution phase. The new leadership generation has no tested working relationships with each other.
    Khamenei''s difficulty cohering this generation (evidenced by Vahidi''s rapid reassignment) is a structural vulnerability that would amplify during a succession crisis. The institution''s willingness
    to commit mass violence in Jan 2026 demonstrates organizational capacity but may mask internal fractures not yet visible externally. [Inference — Med]

    * **[REMAINING GAP: Verified data on specific factional alignments of new IRGC command cohort, and whether Jan 2026 operations revealed command-and-control breakdowns vs. deliberate coordination.]**

    '
- id: B7
  title: Proxy Network Status (External)
  tags:
  - UPDATED
  content: "* **Hezbollah:** Severely weakened after 2024 war with Israel. Nasrallah killed. Lost much of strategic missile capability, UAV workshops, border tunnels. \"Down but not out\" (IISS). Some remnants\
    \ deployed domestically in Iran. Said it is \"no longer remaining neutral\" if Iran attacked again. [Fact/Inference — Med]\n* **Houthis (Ansar Allah):**\n    * Remain operationally active. Threatened\
    \ to engage if Iran is attacked. [Fact]\n    * Have significantly enhanced missile and drone capabilities since 2024 — conducted multiple ballistic missile attacks on Israel (28 launches Mar–May 2025\
    \ alone). [Fact — Med]\n    * Operate with considerable autonomy from Tehran. Senior Iranian official (Telegraph, 2025): \"They have gone rogue — they do not listen to Tehran as much as they used to.\"\
    \ [Fact — single-source, contested]\n    * Iran redeployed Quds Force commander Abdolreza Shahlaei to Yemen to reassert coordination. [Fact — Med]\n    * Atlantic Council analysis argues \"abandonment\"\
    \ narrative is strategic Iranian misdirection, and IRGC maintains covert operational presence including via \"6000 branch.\" [Inference — Med]\n    * **Assessment:** Houthis are best characterized as\
    \ a semi-autonomous strategic partner, not a controlled proxy. They act on shared interests but retain independent decision-making. Iran's ability to restrain or direct them is limited. [Inference —\
    \ Med, multiple sources]\n* **Iraqi PMF:** Active. Kataib Hezbollah leader issued war-preparation statement (Jan 25, 2026). Recruitment drive including suicide bombers. Some units deployed inside Iran\
    \ for protest suppression. \"Declared Jihad and called for mobilization in support of the Iranian regime.\" [Fact — Med]\n* **Afghan Fatemiyoun / Pakistani Zainabiyoun:** Active — deployed inside Iran\
    \ for domestic repression. [Fact]\n* **Syrian network:** Collapsed with Assad's fall (Dec 2024). [Fact]\n* **Network-level assessment:** Proxy network substantially degraded from 2023 peak. Assad gone.\
    \ Hezbollah decimated. Houthis increasingly autonomous. Iraqi PMF activated but as domestic repression tool, not external projection. Iran has consumed external strategic assets for internal survival.\
    \ However, in existential conflict with US, analysts assess Iran would \"go all in\" using all remaining asymmetric capacity. [Inference — Med]\n* **Afghan Taliban:** Stated Feb 15 they would support\
    \ the Islamic Republic in event of US attack. [Fact]\n"
- id: B8
  title: IRGC Naval & Strait of Hormuz Posture
  tags:
  - NEW
  - Feb 2026
  subsections:
  - id: B8.1
    title: '"Smart Control of the Strait of Hormuz" Exercise (Feb 16–18, 2026)'
    level: 3
    content: '* **Exercise name:** "Smart Control of the Strait of Hormuz." Conducted by IRGC Navy in the Strait of Hormuz, Persian Gulf, and Gulf of Oman. Began Feb 16. [Fact — FARS, Tasnim, multiple]

      * **Live-fire components:** Anti-ship cruise missiles fired from Iranian coast and islands at targets in the Strait. IRGC naval drone units and submarine units operated from three Iranian islands
      (Abu Musa, Greater Tunb, Lesser Tunb). [Fact — Iranian media, TWZ]

      * **Armed drones:** FARS News described drones "capable of engaging both air and sea targets" as "newest strategic platforms" deployed "in significant numbers" — names and specs classified. [Fact
      — FARS; capability claims unverified]

      * **Strait closure (UNPRECEDENTED):** Iran announced temporary closure of parts of the Strait of Hormuz "for a few hours" on Feb 17 for "safety and maritime concerns." This is the first time Iran
      has announced closure of the Strait since Trump threatened military action in January 2026, and possibly the first announced closure since the Iran-Iraq War (1980s mining). [Fact — PBS, AP, The National,
      Washington Times]

      * **Operational messaging:** IRGC Navy commander: "The weapon that reaches the battlefield on the day of war is different from what is shown in the exercise." This signals the exercise demonstrates
      minimum, not maximum, capability. [Fact — FARS via The National]

      * **Second exercise in weeks:** This was the second live-fire exercise in the Strait in recent weeks. The first (late Jan/early Feb) did not include announced closures — the escalation was in the
      closure announcement itself. [Fact — AP]

      '
  - id: B8.2
    title: Strategic Context
    level: 3
    content: '* **Hormuz chokepoint:** ~21 nautical miles at narrowest. 20–30% of global daily oil consumption (~20M+ barrels/day) transits the waterway. No alternative route exists. [Fact — High]

      * **Khamenei statement (Feb 17):** "A warship is a dangerous apparatus, but more dangerous than the warship is the weapon that can sink the warship." Also: "The strongest military in the world might
      sometimes receive a blow so hard that it can''t stand up again." [Fact — Iranian state TV, Washington Times]

      * **Historical precedent:** INSS Iran expert Danny Citrinowicz assessed that Iran last closed the Strait during the Iran-Iraq war when it mined the waterway — calling this a message that any strike
      on Iran would have global economic impact. [Fact — PBS/AP]

      * **Mine warfare capability:** Iran retains naval mine warfare capacity. Mine countermeasure assets in the region are limited. Even a credible indication of mining activity can impose lengthy countermeasure
      operations and produce immediate effects on maritime traffic. Mines are a low-cost, high-disruption tool. [Fact/Inference — Med, Army Recognition]

      * **Coastal defense inventory:** C-701 Kosar, C-704 Nasr, C-802 Noor, C-802A Ghader anti-ship cruise missiles deployed in coastal batteries covering much of the Strait. Combined with coastal sensors,
      Iran can activate a multi-axis threat posture in the Strait. [Fact — Med, Army Recognition]

      '
  - id: B8.3
    title: Maritime Security Belt 2026 (Joint Exercise — Russia, China, Iran)
    level: 3
    content: '* **Concurrent exercise:** "Maritime Security Belt 2026" — joint naval exercise held in the Strait of Hormuz concurrent with the IRGC unilateral drills. Russia, China, and Iran participating.
      Seventh iteration since 2019. [Fact — Tehran Times, TWZ]

      * **Russian assets:** Russian Navy helicopter carrier docked in Iranian waters (Bandar Abbas) to participate. [Fact — Press TV]

      * **Russian framing:** Nikolai Patrushev called for BRICS to be given "a full-fledged strategic maritime dimension" and cited the exercise as evidence. Russian naval commander said both sides are
      "ready to hold joint exercises in any region." [Fact — Tehran Times, Telegraph]

      * **Operational implication:** Presence of Russian and Chinese warships in the Strait during any US attack on Iran would create military deconfliction requirements and political complications. Whether
      this is deliberate tripwire placement or routine exercise timing is ambiguous. [Inference — Med]

      * **CROSS-REFERENCE:** Update ITB-F §F5 (Russia) and §F6 (China) with joint exercise details.

      '
  - id: B8.4
    title: Assessment
    level: 3
    content: 'The Hormuz exercise sequence represents a deliberate escalation in Iran''s maritime deterrence signaling:


      1. **Late Jan:** Live-fire exercise in Strait, no closure announcement.

      2. **Feb 16:** Exercise restarts with missile firings from islands, drone/sub operations.

      3. **Feb 17:** First-ever announced closure — crossing a rhetorical threshold Iran had long threatened but never executed.

      4. **Concurrent:** Russia-China naval presence provides implicit escalation insurance.


      The message is layered: to the US, that strikes will produce Hormuz disruption affecting global energy markets; to Gulf states, that their economies are hostage; to the international community, that
      Iran has partners willing to show presence during confrontation. The IRGC Navy commander''s statement that "the weapon on the day of war is different" signals asymmetric reserves beyond what was displayed.


      **Key analytical question:** Is this deterrence signaling (designed to prevent attack) or pre-positioning (preparation for retaliation)? The answer depends on whether the exercise included covert
      mine-laying or pre-positioning of fast attack boats in concealed positions — neither of which can be confirmed from open sources. [Inference — Med]


      **Decision relevance for Scenario 2:** Any second US strike must now incorporate Hormuz disruption into planning. Oil price impact of even a temporary closure or mining threat could exceed the military
      cost of the strike itself. This strengthens the asymmetric deterrence calculus that makes a "clean" strike scenario implausible. [Inference — Med]

      '
- id: B9
  title: Chinese Military Supply Pipeline (NEW -- Session 17)
  content: |
    ### B9.1 Air Bridge Logistics

    * **Chinese Y-20 flights:** Reports of 16 Chinese military cargo aircraft landing in Iran within 56 hours starting approximately January 18, 2026. Flight paths originated from Chinese logistical hubs, transponders switched off near Central Asian air corridors. If substantiated, this is the largest compressed China-Iran military airlift ever recorded. [Inference -- Med; Defence Security Asia, OSINT community, unconfirmed payload]
    * **Earlier Y-20 flights (June 2025):** Two Chinese cargo planes flew from China to Iran, switching off tracking signals before entering Iranian airspace. One took off from Zhengzhou bound for Luxembourg, then landed unexpectedly in Iran. Aviation experts noted the aircraft type is commonly used for transporting military equipment. [Fact -- Med; Flightradar24 OSINT]
    * **Russian Il-76 flights:** At least five Il-76 heavy military transport aircraft arrived in Tehran since January 1, 2026. Airlift tempo exceeds routine bilateral defense cooperation -- reflects crisis-driven surge logistics. Il-76 payload capacity: up to 50 tonnes per sortie (250 tonnes potential across 5 flights). [Fact -- Med; Defence Security Asia, video evidence]
    * **Belarusian Il-76 intermediary flights:** Four Belarusian Il-76s landed in Tehran carrying military cargo of Russian and Chinese origin. Route: Belarus to Iran with intermediate stops. Belarus serving as logistics intermediary for Russian/Chinese military transfers. [Fact -- Med; FlightRadar24, OSINT Terror Alarm]
    * **Y-20 capability:** Payload ~66 tonnes, operational range 7,800+ km fully loaded. Enables direct flights from eastern China to Iran without refueling. Each sortie can theoretically transport HQ-9 battery components, long-range SAM missiles, advanced radar systems, EW suites, or UAV subsystems. [Fact -- High; published specifications]
    * **Assessment:** Combined air bridge volume (16+ Chinese, 5+ Russian, 4+ Belarusian flights since Jan 1, 2026) represents a structured strategic resupply operation, not isolated transactions. The transponder-off pattern across multiple flights from different origin countries indicates coordinated operational security. [Inference -- Med]

    ### B9.2 Confirmed/Near-Confirmed Systems

    **Air Defense:**
    * **HQ-9B long-range SAM:** China's most advanced export-grade surface-to-air missile system. Engagement range 250-260km, altitude ceiling ~50km, 360-degree radar coverage, multi-target tracking (100 targets, 6-8 simultaneous engagements). Mobile deployment: combat-ready in under 15 minutes from march order. Acquired via oil-for-weapons barter arrangement documented by Dryad Global. Represents qualitative leap beyond Iran's S-300 variants and indigenous Bavar-373, which proved insufficient in June 2025 combat. [Fact -- Med-High; Dryad Global, multiple defense outlets, Reuters]
    * **HQ-22 / FK-3 medium-range SAM:** Medium-range coverage, interception altitudes to 27km. Provides layered defense complement to HQ-9B. [Fact -- Med; Defense Mirror]
    * **JY-26 radar:** Optimized for low-observable (stealth) aircraft detection. Paired with HQ-9B as part of integrated air defense network. Export configuration may not include most sensitive Chinese technologies. [Inference -- Med; defence analysis sources]
    * **Performance caveat:** HQ-9B variants failed to intercept Indian strikes in Pakistan during Operation Sindoor and Iranian attacks in Balochistan (2024). Export-grade Chinese systems may underperform against US/Israeli electronic warfare capabilities (EA-18G Growler, F-35 EW suite). Combat effectiveness against US platforms remains untested. [Fact -- Med; Aero News Journal, Military Watch Magazine]

    **Anti-Ship:**
    * **CM-302 supersonic anti-ship cruise missile:** Near-final acquisition stage per Reuters (Feb 24, 2026). Export variant of YJ-12 "carrier killer." Mach 3-4, 290km range, sea-skimming flight profile, 250kg warhead. Can be launched from ships, aircraft, or mobile ground platforms. Also configurable for land-attack. If delivered, represents qualitative leap from Iran's subsonic anti-ship inventory (Ghadir, Noor) to supersonic precision A2/AD capability. CASIC markets CM-302 as capable of sinking aircraft carriers and destroyers. [Fact -- Med-High; Reuters Feb 24, 2026; Times of Israel; Fox News; Defence Security Asia; Army Recognition]

    **Electronic Warfare & Intelligence:**
    * **Cobra V8 EW system:** Reportedly deployed near Strait of Hormuz. Iranian claims of capturing F-35 radar "fingerprint." Claims unverified. [Inference -- Low; Defence Security Asia, Iranian media]
    * **MizarVision satellite constellation:** Chinese commercial satellite system providing real-time high-resolution imagery of US force positions at bases across the Middle East. Has published positions of US strike and support aviation at Al Udeid, Prince Sultan, Diego Garcia. This is the public-facing side; classified sharing through state channels is assumed but unverifiable. [Fact -- Med-High; multiple OSINT sources, satellite imagery verified]
    * **MSS cyber hardening:** China's Ministry of State Security reportedly helping Iran close digital vulnerabilities in security/defense sector by providing access to closed, encrypted Chinese communications systems resistant to CIA/Mossad penetration. [Inference -- Med; Modern Diplomacy report]
    * **Surveillance technology:** Chinese-built surveillance systems (facial recognition, monitoring tools) used in January 2026 crackdown. YLC-8B radar previously confirmed. [Fact -- Med]

    ### B9.3 Oil-for-Weapons Barter Mechanism

    * **Dryad Global documentation (Nov 2025):** Exposed clandestine Iran-China oil-for-weapons pact. Iran bartering crude oil exports for advanced Chinese military hardware including HQ-9 systems, missile guidance technologies, drone components, and solid-fuel propellant inputs. [Fact -- Med; Dryad Global Maritime Security analysis]
    * **Mechanism:** IRGC, Armed Forces General Staff (AFGS), and Chinese entities (including Haokan) held negotiations in October 2025 explicitly linking crude shipments to weapons supply. Described as "direct barter loop between oil revenue and hard military capability." [Fact -- Med; Dryad Global]
    * **Sanctions evasion infrastructure:** Network of front companies, AIS-dark tankers, and port-switching operations designed to circumvent Western sanctions. China absorbs ~90% of Iran's crude exports. [Fact -- Med; Dryad Global, SIPRI]

    ### B9.4 Strategic Assessment

    **The BATNA Shift:** Chinese weapons resupply is improving Iran's walk-away alternative from nuclear negotiations. Pre-resupply (post-June 2025), Iran's air defenses were gutted, missile inventory halved, retaliatory capacity limited. Chinese systems change this calculus: HQ-9B raises cost/complexity of SEAD phase; CM-302 (if delivered) creates genuine threat to carrier strike groups; EW systems reduce US intelligence advantage; satellite intelligence sharing degrades element of surprise. Each improvement reduces Iran's need to concede at the negotiating table. [Inference -- Med-High]

    **China's Four Strategic Incentives:** (1) Weapons validation -- live-fire proving ground for export defense industry; (2) US stockpile attrition -- every interceptor expended against Iran is one fewer for Taiwan; (3) Operational intelligence -- MSB 2026 exercises + MizarVision provide Taiwan-relevant data; (4) Regime preservation -- per ITB-F12 Type A classification, Chinese weapons transfers ensure continued economic access. [Inference -- Med]

    **Delivery vs. operational status:** Being delivered does not equal being operational. Integrating HQ-9B into Iran's air defense network, establishing sensor-sharing, and training operators takes months. CM-302 deal is near-final but no delivery confirmed. Iran's improved BATNA may be partly aspirational. [Inference -- Med]

    **Cross-references:** ITB-F F6.1, ITB-F12, ISA-SCENARIOS Obs 022, ISA-TRAPS Trap 13, Brief #6 (Hormuz section).
