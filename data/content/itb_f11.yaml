- id: F11.60
  title: "KEY FINDING: THE COERCION ASYMMETRY"
  content: |
    A structural distinction emerges from Tier 2/3 research that has implications for the entire F11 framework:

    **Not all actors in Iran's regional environment are equilibrium beneficiaries. Some are equilibrium victims coerced into compliance.**

    Pakistan demonstrates that US sanctions architecture can capture even actors who would benefit from Iran's normalization. This has two implications:

    First, the equilibrium is more fragile than the Tier 1 beneficiary count suggests — if sanctions pressure relaxes, coerced actors (Pakistan, potentially others) would immediately shift behavior toward normalization-enabling activities.

    Second, US policy has miscounted its coalition. States like Pakistan are being treated as reliable anti-Iran partners when they are actually coerced reluctant participants. A deal that provides Pakistan a face-saving exit from its IP pipeline obligations would likely receive quiet Pakistani support, not opposition.

    **This asymmetry does not weaken the F11 thesis — it refines it.** The equilibrium is maintained by a combination of (a) genuine structural beneficiaries who will actively resist change and (b) coerced actors who will comply passively. The Tier 1 actors provide the active resistance; coerced actors provide the passive compliance. Together they constitute the regional architecture that surrounds and sustains Iran's current state.
- id: F11.61
  title: ADVERSARIAL TEST
  content: "**Q: Does Pakistan's case disprove F11's core thesis?**\n\nNo. F11's thesis is that regional actors who appear\
    \ to be mediators or neutral parties are structurally invested in equilibrium. Pakistan doesn't fit this description —\
    \ it's not a mediator and not neutral. It's a constrained energy importer. Its reclassification strengthens the thesis\
    \ by demonstrating that even actors with opposite interests can be captured by the sanctions architecture, without becoming\
    \ beneficiaries.\n\n**Q: Is Oman genuinely a beneficiary or just claiming mediator identity for prestige?**\n\nThe re-export\
    \ data ($803M) is documentary evidence of economic dependence on sanctioned Iran trade, independent of diplomatic identity\
    \ arguments. Even without the mediation industry analysis, Oman has direct economic incentives to preserve Iran's access\
    \ to circumvented trade channels. The two mechanisms are additive, not alternative.\n\n**Q: Does the TRIPP encirclement\
    \ narrative prove Iranian hardliners are right to resist?**\n\nAnalytically irrelevant. Whether encirclement is \"real\"\
    \ or \"perceived\" does not affect its function as an internal spoiler amplifier. What matters for F11 is that external\
    \ geopolitics provides hardliners with a coherent evidence-based argument that pragmatists cannot counter. The mechanism\
    \ operates regardless of correct strategic assessment.\n\n\n*Document: ITB_F_F11_Tier2_3_Addendum_v1_0.md*  \n*Prepared:\
    \ 2026-02-21*  \n*Integration target: Append to ITB_F_F11_Equilibrium_Beneficiaries_v1_0.md or treat as standalone addendum*\
    \  \n*Version control: New document; no prior version*\n"
