# Analytical state summary (update each session)
analytical_summary: |
  Deep coverage achieved on Pillar A: constitutional architecture (A, with expanded A6 Parliament module), theological machinery (A8), IRGC parallel society (A9), eschatological hardline faction with academic validation (A10), Pinochet alignment-switch mechanism (A11). Pillars B-H upgraded to v2.0 working drafts. ITB-D expanded to v5.0 (615 lines) with deep political culture, geography, and small-city analysis. New D16 module (Judiciary) documents the single hardest institutional reconstruction problem in any transition scenario.

  A12 (Coercive-Endurance Interaction Doctrine) provides the behavioral model explaining how the regime
  sequences confrontation and diplomacy as phases in a single cycle. Scope: describes pragmatist operating
  logic (Segment 3); must be read against A10 (eschatological spoiler) and three-segment factional model
  (A10.4a.5) for complete picture. Current assessment: Phase 2→3 transition (Feb 2026).

  **Key analytical finding added Session 10:** Turnout-extremism ratchet (A6.10) is self-tightening. January 2026 massacre accelerated it by a full cycle. Terminal state (Paydari parliamentary monopoly, 2028) weakens the A6.6.2 "free Majlis election as fastest transition path" finding. Any transition coinciding with 13th Majlis sitting must bypass parliament and create a parallel constituent body.

  **Sessions 11-12 (2026-02-21):** Equilibrium beneficiaries + normalization quality research. Three new analytical modules: F11 (Tier 1 active beneficiaries: Qatar, UAE, Turkey, China, Russia, Iraq/PMF), F11 Addendum (Tier 2/3 reclassification: Pakistan → constrained, Oman → mediation industry, Armenia/Azerbaijan → external pressure/TRIPP coupling, India → constrained normalization aspirant), and F12 (Normalization Quality Framework).

  **Top structural finding — F12:** Hollow deal = IRGC enrichment. A nuclear deal without IRGC economic conditionality routes sanctions relief through IRGC-controlled channels (51% statutory oil revenue allocation), enriches the IRGC without divestiture, blocks all Type B actors (Western oil majors, banks, EU companies, diaspora capital, Iranian private sector), and hands South Pars development to China. This is Scenario 1B's economic engine. Deal conditionality design (NIOC restructuring, KAA competitive bidding, banking IRGC divestiture, commercial law) is now a Tier 1 transition planning priority. See ITB-F12, ISA-TRAPS Trap 10, ISA-SCENARIOS Obs 012.

  **TRIPP encirclement coupling:** Armenia-Azerbaijan-US TRIPP corridor (Aug 2025) provides A10 eschatological faction with empirical three-front encirclement evidence, coupling external geopolitics to internal spoiler capacity. Pragmatist acceptance of IRGC divestiture conditionality is politically harder under visible encirclement. Sequencing implication: de-escalation first → conditionality negotiation → snap-back, is preferable to maximum pressure + conditionality demands simultaneously.

  **EU IRGC designation (Feb 2026):** Creates criminal liability for European companies in IRGC-dominant sectors under EU law, independent of US sanctions status. Hollow deal does not unlock EU investment. European reconstruction participation structurally requires IRGC economic divestiture or EU de-designation (politically impossible post-massacre).

  **Top 5 unfilled gaps (updated):** (1) NIOC board IRGC commander composition (G12-01 — Priority 1); (2) Artesh unit-level loyalty signals under blackout; (3) IRGC new command cohort factional alignments; (4) KAA current contract pipeline (G12-02 — Priority 1); (5) Heyat network armed capability (quantitative). See APP-G.
