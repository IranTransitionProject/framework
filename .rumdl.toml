# rumdl configuration — Framework

[global]
# MD013: Line length — 80 chars is too restrictive for prose documentation
# MD036: Emphasis as heading — false positive on subtitle lines
# MD042: Empty link — used for status badges with no target URL
# MD057: Cross-repo relative links unresolvable in CI (repos checked out in isolation)
# MD024: Duplicate heading — session log uses repeated date-based headings
disable = ["MD013", "MD024", "MD036", "MD042", "MD057"]
